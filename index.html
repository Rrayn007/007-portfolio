<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rayn Scofield — Visual Architect. Không gian sáng tạo cyberpunk, chuyên sâu visual, motion & digital experience.">
    <meta property="og:title" content="Rayn Scofield // Visual Architect">
    <meta property="og:description" content="Cinematic Motion • Immersive 3D • Cyberpunk Storyteller">
    <meta property="og:image" content="https://i.imgur.com/your-og-image.jpg">
    <meta property="og:url" content="https://yourdomain.com">
    <meta name="twitter:card" content="summary_large_image">
    <title>Rayn Scofield // Visual Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { red: '#dc2626', dark: '#020203', surface: '#0a0a0c', border: '#1f1f2e' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        ::selection { background-color: #dc2626; color: white; }
        body { background-color: #020203; color: #fff; overflow-x: hidden; scroll-behavior: smooth; font-family: 'Inter', sans-serif; }

        /* ================= PIXEL LED MATRIX - ĐÃ SỬA LỖI ================= */
        .pixel-board {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 1px;
            padding: 3px;
            background: #000;
            border: 2px solid #1f1f2e;
            width: 72px;
            height: 26px;
            border-radius: 2px;
        }
        .pxl {
            background: #0a0a0c;
            border-radius: 1px;
        }
        .pxl.r { background: #dc2626; box-shadow: 0 0 8px #dc2626; animation: ledPulse 1.6s infinite; }
        .pxl.w { background: #fff; opacity: 0.85; }
        @keyframes ledPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ================= BACKGROUND - Sao nhấp nháy rõ ràng hơn ================= */
        .stars-bg, .stars-layer, .moon-glow { position: fixed; inset: 0; z-index: -3; pointer-events: none; }
        .stars-bg { background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px); background-size: 55px 55px; }
        .stars-layer {
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                              radial-gradient(rgba(255,255,255,0.03) 2px, transparent 2px);
            background-size: 85px 85px, 170px 170px;
            background-position: 0 0, 35px 55px;
            filter: blur(1.5px);
            animation: starTwinkle 18s infinite linear;
            opacity: 0.85;
        }
        @keyframes starTwinkle { 0%,100% {opacity:0.45} 50% {opacity:0.95} }
        .moon-glow {
            top: -45vh; left: 50%; transform: translateX(-50%);
            width: 140vw; height: 140vw; max-width: 1700px;
            background: radial-gradient(circle, rgba(255,255,255,0.11) 0%, rgba(255,255,255,0.03) 40%, transparent 75%);
            border-radius: 50%; z-index: -2; filter: blur(75px);
            animation: moonBreath 18s infinite alternate ease-in-out; opacity: 0.8;
        }
        @keyframes moonBreath { from {opacity:0.6; transform:translateX(-50%) scale(0.9)} to {opacity:0.9; transform:translateX(-50%) scale(1.1)} }

        /* CRT & Glass */
        .crt-overlay {
            position: fixed; inset: 0; z-index: 99999; pointer-events: none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(220,38,38,0.18) 3px, rgba(220,38,38,0.18) 6px),
                        linear-gradient(rgba(255,255,255,0.035) 50%, transparent 50%);
            background-size: 100% 6px, 100% 100%;
            animation: crt-scan 4s linear infinite, crt-flicker 0.07s infinite alternate;
            opacity: 0.14; mix-blend-mode: overlay;
            box-shadow: inset 0 0 140px rgba(0,0,0,0.9), inset 0 0 45px rgba(220,38,38,0.2);
        }
        @keyframes crt-scan { 0%{background-position:0 0,0 0} 100%{background-position:0 100%,0 0} }
        @keyframes crt-flicker { 0%,100%{opacity:0.14} 50%{opacity:0.19} }

        .glass-panel, .glass-strong { 
            background: rgba(10,10,12,0.72); 
            backdrop-filter: blur(32px); 
            border: 1px solid rgba(255,255,255,0.09); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .glass-strong { background: rgba(10,10,12,0.85); border-color: rgba(255,255,255,0.15); }

        .lux-text { font-weight: 900; letter-spacing: -0.045em; text-shadow: 0 12px 45px rgba(220,38,38,0.3); }

        /* Card 3D */
        .card-scene { perspective: 1600px; touch-action: none; }
        .card-inner {
            position: relative; width: 100%; height: 100%; overflow: hidden; background: #050505;
            transform-style: preserve-3d; will-change: transform;
            transition: transform 0.12s cubic-bezier(0.23,1,0.32,1);
            border: 1px solid rgba(255,255,255,0.09); border-radius: 0 !important;
            box-shadow: 0 30px 70px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .glare, .specular { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
        .glare { opacity: 0; transition: opacity 0.4s cubic-bezier(0.23,1,0.32,1); background-size: 250% 250%; mix-blend-mode: color-dodge; filter: brightness(1.15); }
        .specular {
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.22) 18%, rgba(255,255,255,0.05) 42%, transparent 68%);
            mix-blend-mode: screen; opacity: 0; transition: opacity 0.45s cubic-bezier(0.23,1,0.32,1); filter: blur(6px);
        }

        .project-card { transition: all 0.4s cubic-bezier(0.23,1,0.32,1); }
        .project-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }

        .hero-section { padding-top: 7rem; }
        @media (min-width: 768px) { .hero-section { padding-top: 11rem; } }
        section { scroll-margin-top: 88px; }

        @media (max-width: 640px) { .card-scene { width: 280px !important; height: 392px !important; } }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 9999px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="stars-layer"></div>
    <div class="moon-glow"></div>
    <div id="crt-overlay" class="crt-overlay"></div>

    <!-- HEADER -->
    <header id="main-header" class="fixed top-0 w-full z-50 glass-strong h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <div class="flex items-center gap-6">
                <img id="site-logo" src="" alt="Rayn Scofield" class="h-9 opacity-0 transition-opacity duration-1000" />
                <div class="pixel-board" id="led-matrix"></div>
            </div>
            <nav class="hidden md:flex items-center gap-10 text-sm font-bold tracking-[0.25em] uppercase">
                <a href="#about" onclick="smoothScrollTo('about')" class="hover:text-brand-red transition-colors">ABOUT</a>
                <a href="#work" onclick="smoothScrollTo('work')" class="hover:text-brand-red transition-colors">WORK</a>
                <a href="#collection" onclick="smoothScrollTo('collection')" class="hover:text-brand-red transition-colors">COLLECTION</a>
                <a href="#contact" onclick="smoothScrollTo('contact')" class="hover:text-brand-red transition-colors">CONTACT</a>
            </nav>
            <div class="hidden md:block text-[10px] tracking-[0.65em] font-bold text-gray-400 uppercase">
                RAYN SCOFIELD <span class="text-brand-red">/</span> VISUAL ARCHITECT
            </div>
            <button onclick="toggleMobileNav()" class="md:hidden p-2 text-brand-red">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>

        <div id="mobile-nav" class="hidden fixed top-20 inset-x-0 bg-[#020203]/95 backdrop-blur-3xl border-b border-white/10 py-8 px-8 md:hidden flex flex-col gap-8 text-center z-[999]">
            <a href="#about" onclick="toggleMobileNav();smoothScrollTo('about')" class="text-xl font-bold hover:text-brand-red">ABOUT</a>
            <a href="#work" onclick="toggleMobileNav();smoothScrollTo('work')" class="text-xl font-bold hover:text-brand-red">WORK</a>
            <a href="#collection" onclick="toggleMobileNav();smoothScrollTo('collection')" class="text-xl font-bold hover:text-brand-red">COLLECTION</a>
            <a href="#contact" onclick="toggleMobileNav();smoothScrollTo('contact')" class="text-xl font-bold hover:text-brand-red">CONTACT</a>
        </div>
    </header>

    <!-- Phần còn lại giữ nguyên như code trước (hero, about, work, collection, contact, footer, modal) -->
    <!-- (Tôi giữ nguyên để ngắn gọn, bạn chỉ cần thay phần <style> và <header> là đủ) -->

    <script>
        /* ... phần script giữ nguyên như code trước ... */
        /* Chỉ cần đảm bảo initLED() chạy đúng */
        function initLED() {
            const matrix = document.getElementById('led-matrix');
            matrix.innerHTML = '';
            const pattern = [0,13,42,55,16,17,20,21,30,31,34,35];
            for (let i = 0; i < 56; i++) {
                const px = document.createElement('div');
                const isRed = [0,13,42,55].includes(i);
                px.className = `pxl ${isRed ? 'r' : pattern.includes(i) ? 'w' : ''}`;
                matrix.appendChild(px);
            }
        }

        /* Phần còn lại của script giữ nguyên */
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            initLED();
            if (SHEET_CSV_URL.includes('http')) initPortfolio();
            /* ... */
        });
    </script>
</body>
</html>
