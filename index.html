    <script>
        // ==========================================
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";
        // ==========================================
        
        document.getElementById('current-year').textContent = new Date().getFullYear();
        let globalProjects = [];

        function parseCSVRow(str) {
            const result = [];
            let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
                else cur += str[i];
            }
            result.push(cur);
            return result.map(val => {
                val = val.trim();
                if (val.startsWith('"') && val.endsWith('"')) return val.slice(1, -1).replace(/""/g, '"');
                return val;
            });
        }

        async function initPortfolio() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                if (rows.length < 2) throw new Error("Dữ liệu trống");

                const headers = parseCSVRow(rows[0]);
                const config = {};
                const projects = [];

                rows.slice(1).forEach(row => {
                    const matchValues = parseCSVRow(row);
                    const getValue = (colName) => {
                        const idx = headers.indexOf(colName);
                        return (idx !== -1 && idx < matchValues.length) ? matchValues[idx] : '';
                    };

                    const cKey = getValue('ConfigKey');
                    if (cKey) config[cKey] = getValue('ConfigValue');

                    const pTitle = getValue('Title');
                    if (pTitle) {
                        projects.push({
                            Title: pTitle, Category: getValue('Category'),
                            ImageUrl: getValue('ImageUrl'), Description: getValue('Description'), Link: getValue('Link')
                        });
                    }
                });

                // Cấu hình UI
                if (config.siteLogo) {
                    const logo = document.getElementById('site-logo');
                    logo.src = config.siteLogo; logo.classList.remove('opacity-0');
                }
                if (config.siteSignature) {
                    const sig = document.getElementById('footer-signature');
                    sig.src = config.siteSignature; sig.classList.remove('opacity-0');
                }
                // --- Xử lý hiển thị nhiều thẻ Trading Card tự động ---
                const cardsContainer = document.getElementById('trading-cards-container');
                const cardKeys = Object.keys(config).filter(key => key.startsWith('tradingCard'));
                
                if (cardKeys.length > 0) {
                    cardsContainer.innerHTML = ''; // Xóa nội dung cũ
                    cardKeys.forEach(key => {
                        const imageUrl = config[key];
                        cardsContainer.innerHTML += `
                            <div class="card-3d-wrapper w-[300px] h-[420px] md:w-[350px] md:h-[490px] cursor-pointer mb-8" 
                                 onmousemove="handleMouseMove(event, this)" 
                                 onmouseleave="handleMouseLeave(this)">
                                <div class="card-3d-inner w-full h-full relative rounded-2xl overflow-hidden border-2 border-gray-600 bg-gray-900 shadow-2xl">
                                    <div class="card-metallic-pattern"></div>
                                    <div class="card-holographic-glare"></div>
                                    <img src="${imageUrl}" alt="Trading Card" class="w-full h-full object-cover relative z-0" />
                                </div>
                            </div>
                        `;
                    });
                }

                // Profile
                document.getElementById('p-country-name').textContent = config.country || 'Vietnam';
                document.getElementById('p-school-name').textContent = config.schoolName || 'University';
                if (config.schoolLogo) {
                    const sLogo = document.getElementById('p-school-logo');
                    sLogo.src = config.schoolLogo; sLogo.classList.remove('hidden');
                }

                // Skills
                if (config.skills) {
                    const skillsTagsGrid = document.getElementById('p-skills-tags');
                    const skillsArray = config.skills.split(',').map(s => s.trim()).filter(s => s !== '');
                    skillsArray.forEach(skill => {
                        skillsTagsGrid.innerHTML += `
                            <span class="px-4 py-1.5 rounded-md border border-gray-800 bg-[#0a0a0a] text-xs font-medium text-gray-300 hover:border-brand-orange hover:text-brand-orange transition-colors">
                                ${skill}
                            </span>
                        `;
                    });
                }

                globalProjects = projects;
                renderProjects(projects);

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = "<p class='text-brand-red'>Lỗi tải dữ liệu.</p>";
            }
        }

        function renderProjects(projects) {
            const grid = document.getElementById('portfolio-grid');
            let htmlContent = '';
            
            projects.forEach((project, index) => {
                const img = project.ImageUrl || 'https://via.placeholder.com/800';
                const delay = index * 50;

                htmlContent += `
                    <div onclick="openModal(${index})" 
                       class="group relative glass-panel rounded-2xl overflow-hidden cursor-pointer animate-fade-in-up hover:-translate-y-2 transition-transform duration-300 border border-gray-800 hover:border-brand-orange/50 shadow-lg"
                       style="animation-delay: ${delay}ms; opacity: 0;"
                    >
                        <div class="relative h-64 overflow-hidden bg-black/50 border-b border-gray-800">
                            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors z-10 duration-500"></div>
                            <img src="${img}" alt="${project.Title}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" loading="lazy" />
                            <span class="absolute top-4 left-4 z-20 text-[10px] font-bold uppercase tracking-widest bg-black/70 backdrop-blur-md text-white px-3 py-1 rounded-sm border border-gray-700">
                                ${project.Category}
                            </span>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold mb-2 text-white group-hover:text-brand-orange transition-colors truncate">
                                ${project.Title}
                            </h3>
                            <p class="text-gray-500 line-clamp-2 text-sm font-light">
                                ${project.Description}
                            </p>
                        </div>
                        <div class="absolute bottom-0 left-0 h-1 w-0 bg-gradient-to-r from-brand-red to-brand-orange group-hover:w-full transition-all duration-500 z-30"></div>
                    </div>
                `;
            });

            grid.innerHTML = htmlContent;
            document.getElementById('loading').classList.add('hidden');
            grid.classList.remove('hidden');
            setTimeout(() => { grid.classList.remove('opacity-0'); }, 50);
        }

        /* --- XỬ LÝ MODAL & FULLSCREEN --- */
        function openModal(index) {
            const project = globalProjects[index];
            if(!project) return;
            
            document.getElementById('modal-img').src = project.ImageUrl || '';
            document.getElementById('modal-category').textContent = project.Category || '';
            document.getElementById('modal-title').textContent = project.Title || '';
            document.getElementById('modal-desc').textContent = project.Description || '';
            
            const linkBtn = document.getElementById('modal-link');
            if (project.Link && project.Link.trim() !== '') {
                linkBtn.href = project.Link; linkBtn.classList.remove('hidden');
            } else { linkBtn.classList.add('hidden'); }

            const modal = document.getElementById('project-modal');
            const contentBox = document.getElementById('modal-content-box');
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                contentBox.classList.remove('scale-95');
                contentBox.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('project-modal');
            const contentBox = document.getElementById('modal-content-box');
            
            modal.classList.add('opacity-0');
            contentBox.classList.remove('scale-100');
            contentBox.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 400);
        }

        function toggleFullScreen() {
            const img = document.getElementById('modal-img');
            if (!document.fullscreenElement) {
                if (img.requestFullscreen) { img.requestFullscreen(); }
                else if (img.webkitRequestFullscreen) { img.webkitRequestFullscreen(); } // Safari
                else if (img.msRequestFullscreen) { img.msRequestFullscreen(); } // IE11
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        /* --- HIỆU ỨNG THẺ 3D METALIC & HOLOGRAPHIC (NÂNG CẤP) --- */
        function handleMouseMove(e, element) {
            const inner = element.querySelector('.card-3d-inner');
            const glare = element.querySelector('.card-holographic-glare'); // LỚP HOLOGRAPHIC MỚI
            const rect = element.getBoundingClientRect();
            
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            
            // Tăng cường độ nghiêng một chút
            const rotateY = x * 35; 
            const rotateX = y * -35;
            
            inner.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            
            // XỬ LÝ LỚP HOLOGRAPHIC CẦU VỒNG:
            // Gradient di chuyển theo hướng ngược lại của chuột để tạo chiều sâu phản chiếu
            const glareX = 50 - (x * 100);
            const glareY = 50 - (y * 100);
            
            glare.style.opacity = '1';
            // Di chuyển background-position của gradient quang phổ
            glare.style.backgroundPosition = `${glareX}% ${glareY}%`;
            // Thêm một chút độ sáng trắng mờ theo tâm chuột
            glare.style.backgroundImage = `
                radial-gradient(circle at ${e.clientX - rect.left}px ${e.clientY - rect.top}px, rgba(255,255,255,0.2) 0%, transparent 50%),
                linear-gradient(135deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 25%, rgba(255, 0, 0, 0.1) 35%, rgba(255, 255, 0, 0.15) 45%, rgba(0, 255, 0, 0.1) 55%, rgba(0, 0, 255, 0.1) 65%, rgba(255, 255, 255, 0) 75%, rgba(255, 255, 255, 0) 100%)
            `;
        }

        function handleMouseLeave(element) {
            const inner = element.querySelector('.card-3d-inner');
            const glare = element.querySelector('.card-holographic-glare');
            
            inner.style.transform = `rotateX(0deg) rotateY(0deg)`;
            glare.style.opacity = '0';
        }

        if(SHEET_CSV_URL.includes("http")) { initPortfolio(); } 
    </script>
</body>
</html>
