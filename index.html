<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayn Scofield // Visual Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { red: '#dc2626', dark: '#020203', surface: '#0a0a0c', border: '#1a1a24' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        ::selection { background-color: #dc2626; color: white; }
        body { background-color: #020203; color: #fff; overflow-x: hidden; scroll-behavior: smooth; font-family: 'Inter', sans-serif; }

        /* 1. YouTube Loading Bar */
        #yt-loader { position: fixed; top: 0; left: 0; height: 3px; background: #dc2626; z-index: 1000; transition: width 0.3s ease; width: 0%; box-shadow: 0 0 10px #dc2626; }

        /* 2. Moon & Space Theme */
        .moon-glow {
            position: fixed; top: -35vh; left: 50%; transform: translateX(-50%);
            width: 100vw; height: 100vw; max-width: 1200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 40%, transparent 70%);
            border-radius: 50%; z-index: -1; pointer-events: none;
            animation: moonBreath 10s infinite alternate ease-in-out;
        }
        @keyframes moonBreath { from { opacity: 0.5; transform: translateX(-50%) scale(0.95); } to { opacity: 1; transform: translateX(-50%) scale(1.05); } }
        .stars-bg { position: fixed; inset: 0; z-index: -2; background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 60px 60px; }

        /* 3. Pixel LED Sticker (Header) */
        .pixel-board { display: grid; grid-template-columns: repeat(14, 1fr); gap: 1px; padding: 2px; background: #000; border: 1px solid #1f1f2e; width: 64px; height: 22px; }
        .pxl { background: #0a0a0c; border-radius: 0.5px; }
        .pxl.r { background: #dc2626; box-shadow: 0 0 4px #dc2626; animation: ledPulse 2s infinite; }
        .pxl.w { background: #fff; opacity: 0.8; }
        @keyframes ledPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* 4. Motion Border & 3D System (Anti-Lag RAF) */
        .card-scene { perspective: 1500px; }
        .border-wrap {
            position: relative; padding: 2px; border-radius: 1.5rem; overflow: hidden;
            background: #111; transform-style: preserve-3d; will-change: transform; transition: transform 0.1s linear;
        }
        .border-wrap::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, #dc2626, #fff, transparent, transparent);
            animation: spinBorder 5s linear infinite; z-index: 0;
        }
        @keyframes spinBorder { 100% { transform: rotate(360deg); } }

        .card-inner { position: relative; width: 100%; height: 100%; border-radius: 1.4rem; overflow: hidden; background: #050505; z-index: 1; }
        .glare { position: absolute; inset: 0; opacity: 0; z-index: 5; pointer-events: none; transition: opacity 0.4s; }

        /* Tối ưu Effect Material */
        .effect-holo { background: linear-gradient(115deg, transparent 10%, rgba(255,0,0,0.3) 30%, rgba(0,255,0,0.2) 50%, rgba(0,0,255,0.3) 70%, transparent 90%); background-size: 200% 200%; mix-blend-mode: color-dodge; }
        .effect-mirror { background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.6) 45%, rgba(255,255,255,0.6) 55%, transparent 65%); background-size: 200% 200%; mix-blend-mode: overlay; }
        .effect-gold { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fcf6ba); mix-blend-mode: overlay; opacity: 0.7 !important; }
        .effect-metal { background: linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 3px 100%; mix-blend-mode: overlay; opacity: 0.4; }

        .glass-nav { background: rgba(2, 2, 3, 0.75); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div id="yt-loader"></div>
    <div class="stars-bg"></div>
    <div class="moon-glow"></div>

    <header class="fixed top-0 w-full z-50 glass-nav h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <div class="flex items-center gap-6">
                <img id="site-logo" src="" alt="007" class="h-8 opacity-0 transition-opacity duration-1000 object-contain" />
                <div class="pixel-board" id="led-matrix"></div>
            </div>
            <div class="text-[10px] tracking-[0.4em] text-gray-500 font-bold uppercase hidden md:block">
                RAYN SCOFIELD <span class="text-brand-red px-2">/</span> VISUAL ELITE
            </div>
        </div>
    </header>

    <section class="pt-52 pb-20 px-6 text-center relative z-10">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-sm border border-brand-border bg-brand-surface text-[10px] font-bold tracking-[0.3em] text-brand-red mb-10 shadow-inner uppercase">
            <span class="w-1.5 h-1.5 rounded-full bg-brand-red animate-pulse"></span> AVAILABLE FOR FREELANCE
        </div>

        <h1 class="font-black tracking-tighter uppercase leading-[0.85] text-[15vw] md:text-[9rem] flex flex-wrap justify-center gap-x-6 select-none pr-2">
            <span class="text-white drop-shadow-2xl">VISUAL</span>
            <span class="text-brand-red">ELITE</span>
        </h1>
        
        <div class="flex flex-col md:flex-row items-center justify-center gap-6 text-gray-400 text-sm font-light mt-12 mb-10 tracking-widest uppercase">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span id="p-country-name" class="font-bold">Vietnam</span>
            </div>
            <span class="hidden md:block w-1 h-1 rounded-full bg-gray-700"></span>
            <div class="flex items-center gap-3">
                <img id="p-school-logo" src="" alt="School" class="h-5 w-auto object-contain hidden" />
                <span id="p-school-name" class="font-bold">University</span>
            </div>
        </div>

        <div id="p-skills-tags" class="flex flex-wrap justify-center gap-4 max-w-4xl mx-auto"></div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-32 relative z-10 flex-grow">
        <div id="loading" class="flex justify-center py-20"><div class="animate-spin h-8 w-8 border-t-2 border-brand-red rounded-full"></div></div>
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden opacity-0 transition-opacity duration-1000"></div>
    </main>

    <section class="py-32 border-t border-white/5 bg-brand-surface relative z-10 text-center">
        <h2 class="text-3xl md:text-4xl font-black mb-24 tracking-tighter text-white uppercase">Exclusive Collection</h2>
        <div id="cards-container" class="flex flex-wrap justify-center gap-16 md:gap-24">
            </div>
    </section>

    <footer class="py-32 bg-black border-t border-white/5 text-center relative z-10">
        <img id="footer-signature" src="" alt="Signature" class="h-28 md:h-40 mx-auto mb-12 invert opacity-30 hover:opacity-100 transition-all duration-1000 grayscale hover:grayscale-0 object-contain" />
        <p class="text-[9px] tracking-[0.5em] text-gray-600 font-bold uppercase">&copy; <span id="current-year"></span> // DESIGNED BY SCOFIELD</p>
    </footer>

    <div id="project-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-all duration-400">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl cursor-pointer" onclick="closeModal()"></div>
        <div id="modal-content-box" class="relative bg-[#080808] w-full max-w-[95vw] md:max-w-7xl h-[90vh] md:h-[85vh] rounded-3xl shadow-2xl flex flex-col md:flex-row overflow-hidden transform scale-95 transition-transform duration-400 border border-white/5">
            
            <button onclick="closeModal()" class="absolute top-5 right-5 z-50 bg-black/50 hover:bg-brand-red p-2.5 rounded-full text-white transition-colors border border-white/10">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="w-full md:w-[65%] h-[45vh] md:h-full bg-black flex items-center justify-center p-8 border-r border-white/5 relative group">
                <img id="modal-img" src="" class="max-w-full max-h-full object-contain drop-shadow-2xl" />
                <button onclick="toggleFullScreen()" class="absolute bottom-6 right-6 bg-black/60 hover:bg-brand-red p-3 rounded-xl text-white backdrop-blur-sm transition-all opacity-0 group-hover:opacity-100 shadow-lg border border-white/10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
            
            <div class="w-full md:w-[35%] p-10 md:p-14 flex flex-col custom-scroll overflow-y-auto bg-brand-surface">
                <span id="modal-category" class="text-brand-red text-[10px] font-bold tracking-widest mb-4 uppercase"></span>
                <h2 id="modal-title" class="text-3xl md:text-4xl font-black text-white mb-6 leading-tight tracking-tight"></h2>
                <div class="w-10 h-1 bg-brand-red mb-8"></div>
                <p id="modal-desc" class="text-gray-400 text-sm leading-relaxed mb-10 whitespace-pre-line font-light"></p>
                <div class="mt-auto border-t border-white/5 pt-8">
                    <a id="modal-link" href="#" target="_blank" class="block py-5 border border-white/10 bg-white/5 text-center text-[10px] font-bold text-white hover:bg-white hover:text-black transition-all tracking-[0.3em] uppercase hidden rounded-lg">
                        Launch Project
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";
        document.getElementById('current-year').textContent = new Date().getFullYear();
        let globalProjects = [];

        function initLED() {
            const matrix = document.getElementById('led-matrix');
            const pattern = [0, 13, 42, 55, 16, 17, 20, 21, 30, 31, 34, 35]; // Pattern "007"
            for(let i=0; i<56; i++) {
                const px = document.createElement('div');
                px.className = 'pxl';
                if([0,13,42,55].includes(i)) px.classList.add('r');
                else if(pattern.includes(i)) px.classList.add('w');
                matrix.appendChild(px);
            }
        }

        function parseCSVRow(str) {
            const result = []; let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
                else cur += str[i];
            }
            result.push(cur);
            return result.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        async function initPortfolio() {
            const yt = document.getElementById('yt-loader');
            yt.style.width = '30%';
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                yt.style.width = '80%';
                
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                const headers = parseCSVRow(rows[0]);
                
                // Thuật toán siêu tìm kiếm cột
                const findCol = (name) => headers.findIndex(h => h.toLowerCase().replace(/[^a-z]/g, '').includes(name.toLowerCase()));
                const idxKey = findCol('configkey'), idxVal = findCol('configvalue'), idxEff = findCol('effect');

                const config = {}, cards = [], projects = [];
                rows.slice(1).forEach(row => {
                    const vals = parseCSVRow(row);
                    const k = vals[idxKey] || '', v = vals[idxVal] || '';
                    const eff = (idxEff !== -1 && vals[idxEff]) ? vals[idxEff].toLowerCase().trim() : 'metal';

                    if(k) config[k] = v;
                    
                    // Tự động gom TẤT CẢ các thẻ có chữ tradingCard
                    if(k.toLowerCase().startsWith('tradingcard') && v.startsWith('http')) {
                        cards.push({ img: v, eff: eff });
                    }
                    
                    const tIdx = findCol('title');
                    if(tIdx !== -1 && vals[tIdx]) {
                        projects.push({ Title: vals[tIdx], Category: vals[findCol('category')] || '', ImageUrl: vals[findCol('imageurl')] || '', Description: vals[findCol('description')] || '', Link: vals[findCol('link')] || '' });
                    }
                });

                // --- ĐỔ DỮ LIỆU VÀO GIAO DIỆN ---
                if(config.siteLogo) { document.getElementById('site-logo').src = config.siteLogo; document.getElementById('site-logo').classList.remove('opacity-0'); }
                if(config.siteSignature) { document.getElementById('footer-signature').src = config.siteSignature; document.getElementById('footer-signature').classList.remove('opacity-0'); }
                
                document.getElementById('p-country-name').textContent = config.country || 'Vietnam';
                document.getElementById('p-school-name').textContent = config.schoolName || 'University';
                if (config.schoolLogo) { document.getElementById('p-school-logo').src = config.schoolLogo; document.getElementById('p-school-logo').classList.remove('hidden'); }

                if(config.skills) {
                    config.skills.split(',').forEach(s => {
                        document.getElementById('p-skills-tags').innerHTML += `<span class="px-5 py-2 border border-white/5 bg-white/5 rounded-lg text-[10px] font-bold text-gray-500 uppercase tracking-widest hover:text-white hover:border-brand-red transition-all cursor-default shadow-sm">${s.trim()}</span>`;
                    });
                }

                // Render Cards Tự Động
                const cardsContainer = document.getElementById('cards-container');
                cards.forEach(c => {
                    cardsContainer.innerHTML += `
                        <div class="card-scene w-[300px] h-[420px] md:w-[340px] md:h-[476px] cursor-crosshair" onmousemove="mv(event, this)" onmouseleave="ml(this)">
                            <div class="border-wrap w-full h-full shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                                <div class="card-inner">
                                    <div class="glare effect-${c.eff}"></div>
                                    <img src="${c.img}" class="w-full h-full object-cover" loading="lazy" />
                                </div>
                            </div>
                        </div>`;
                });

                // Render Projects
                const grid = document.getElementById('portfolio-grid');
                projects.forEach((p, i) => {
                    grid.innerHTML += `
                        <div onclick="openModal(${i})" class="group bg-brand-surface border border-white/5 rounded-2xl overflow-hidden cursor-pointer hover:border-brand-red/50 transition-all duration-500 hover:-translate-y-2 shadow-lg">
                            <div class="h-64 overflow-hidden bg-black relative">
                                <div class="absolute inset-0 bg-black/40 group-hover:bg-transparent transition-colors z-10 duration-700"></div>
                                <img src="${p.ImageUrl}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-all duration-1000 group-hover:scale-105" loading="lazy" />
                            </div>
                            <div class="p-8">
                                <h3 class="text-xl font-bold text-white truncate uppercase tracking-tighter">${p.Title}</h3>
                                <p class="text-brand-red text-[9px] font-bold tracking-widest mt-3 uppercase">${p.Category}</p>
                            </div>
                        </div>`;
                });

                globalProjects = projects;
                document.getElementById('loading').classList.add('hidden');
                grid.classList.remove('hidden');
                setTimeout(() => { grid.classList.remove('opacity-0'); }, 50);

                yt.style.width = '100%'; setTimeout(() => yt.style.opacity = '0', 500);

            } catch (e) { 
                console.error(e); 
                document.getElementById('loading').innerHTML = "<p class='text-brand-red font-bold uppercase'>Lỗi tải dữ liệu. Vui lòng kiểm tra CSV.</p>";
            }
        }

        // --- RAF ENGINE 3D CHỐNG LAG ---
        let ticking = false;
        function mv(e, el) {
            if(!ticking) {
                window.requestAnimationFrame(() => {
                    const wrap = el.querySelector('.border-wrap'), glare = el.querySelector('.glare');
                    const r = el.getBoundingClientRect();
                    const x = (e.clientX - r.left) / r.width - 0.5, y = (e.clientY - r.top) / r.height - 0.5;
                    wrap.style.transform = `rotateX(${y * -25}deg) rotateY(${x * 25}deg)`;
                    glare.style.opacity = '1';
                    glare.style.backgroundPosition = `${(x+0.5)*100}% ${(y+0.5)*100}%`;
                    ticking = false;
                }); ticking = true;
            }
        }
        function ml(el) { el.querySelector('.border-wrap').style.transform = 'rotateX(0deg) rotateY(0deg)'; el.querySelector('.glare').style.opacity = '0'; }

        // --- MODAL LOGIC ---
        function openModal(index) {
            const project = globalProjects[index];
            if(!project) return;
            document.getElementById('modal-img').src = project.ImageUrl || '';
            document.getElementById('modal-category').textContent = project.Category || '';
            document.getElementById('modal-title').textContent = project.Title || '';
            document.getElementById('modal-desc').textContent = project.Description || '';
            
            const linkBtn = document.getElementById('modal-link');
            if (project.Link && project.Link.trim() !== '') { linkBtn.href = project.Link; linkBtn.classList.remove('hidden'); } 
            else { linkBtn.classList.add('hidden'); }

            const modal = document.getElementById('project-modal');
            const contentBox = document.getElementById('modal-content-box');
            modal.classList.remove('hidden'); document.body.style.overflow = 'hidden';
            setTimeout(() => { modal.classList.remove('opacity-0'); contentBox.classList.remove('scale-95'); contentBox.classList.add('scale-100'); }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('project-modal');
            const contentBox = document.getElementById('modal-content-box');
            modal.classList.add('opacity-0'); contentBox.classList.remove('scale-100'); contentBox.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); document.body.style.overflow = ''; }, 400);
        }

        function toggleFullScreen() {
            const img = document.getElementById('modal-img');
            if (!document.fullscreenElement) { img.requestFullscreen().catch(err => console.log(err)); } 
            else { document.exitFullscreen(); }
        }

        initLED();
        if(SHEET_CSV_URL.includes("http")) { initPortfolio(); } 
    </script>
</body>
</html>
