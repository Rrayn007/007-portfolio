<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DEBUG DATA // RAYN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-10">
    <h1 class="text-xs tracking-widest text-zinc-500 mb-10">DEBUG MODE: CHECKING ROW-BASED EFFECT</h1>
    
    <div id="test-container" class="flex flex-wrap gap-10"></div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";

        function parseCSVRow(str) {
            const result = [];
            let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
                else cur += str[i];
            }
            result.push(cur);
            return result.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        async function init() {
            try {
                const res = await fetch(SHEET_CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').filter(r => r.trim() !== '');
                const headers = parseCSVRow(rows[0]);
                
                // Tìm vị trí cột Effect (Không phân biệt hoa thường)
                const idxKey = headers.findIndex(h => h.toLowerCase().includes('key'));
                const idxEffect = headers.findIndex(h => h.toLowerCase().includes('eff'));

                const container = document.getElementById('test-container');

                rows.slice(1).forEach((row, i) => {
                    const vals = parseCSVRow(row);
                    const key = vals[idxKey] || `Row_${i+1}`;
                    const effect = (idxEffect !== -1 && vals[idxEffect]) ? vals[idxEffect] : "NULL";

                    // Chỉ hiện những hàng có liên quan đến tradingCard
                    if (key.toLowerCase().includes('tradingcard')) {
                        container.innerHTML += `
                            <div class="border border-zinc-800 p-6 rounded bg-zinc-900 w-64">
                                <p class="text-[10px] text-zinc-500 mb-2 uppercase">${key}</p>
                                <div class="text-4xl font-black text-orange-500 underline">
                                    ${effect}
                                </div>
                                <p class="text-[10px] text-zinc-600 mt-4 italic">Index cột Effect: ${idxEffect}</p>
                            </div>
                        `;
                    }
                });

                if (container.innerHTML === "") {
                    container.innerHTML = "Không tìm thấy hàng nào có Key chứa 'tradingCard'.";
                }

            } catch (e) {
                document.body.innerHTML = "LỖI KẾT NỐI: " + e.message;
            }
        }

        init();
    </script>
</body>
</html>
