<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rayn Scofield — Visual Elite. Không gian sáng tạo huyền bí, chuyên sâu visual &amp; design.">
    <title>Rayn Scofield // Visual Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: { 
                            red: '#dc2626', 
                            dark: '#020203', 
                            surface: '#0a0a0c', 
                            border: '#1f1f2e' 
                        } 
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        ::selection { background-color: #dc2626; color: white; }
        body { 
            background-color: #020203; 
            color: #fff; 
            overflow-x: hidden; 
            scroll-behavior: smooth; 
            font-family: 'Inter', sans-serif; 
        }
        
        /* ================= BACKGROUND - Tăng độ rõ & huyền bí ================= */
        .stars-bg { 
            position: fixed; 
            inset: 0; 
            z-index: -2; 
            background-image: radial-gradient(rgba(255,255,255,0.09) 1px, transparent 1px); 
            background-size: 55px 55px; 
        }
        .stars-layer {
            position: fixed; 
            inset: 0; 
            z-index: -3; 
            background-image: 
                radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.03) 2px, transparent 2px);
            background-size: 85px 85px, 170px 170px;
            background-position: 0 0, 35px 55px;
            filter: blur(2px);
            animation: starTwinkle 25s infinite linear;
            opacity: 0.85;
        }
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.55; }
            50% { opacity: 0.95; }
        }
        .moon-glow {
            position: fixed; 
            top: -42vh; 
            left: 50%; 
            transform: translateX(-50%);
            width: 135vw; 
            height: 135vw; 
            max-width: 1650px;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.035) 38%, transparent 72%);
            border-radius: 50%; 
            z-index: -1; 
            pointer-events: none;
            filter: blur(68px);
            animation: moonBreath 20s infinite alternate ease-in-out;
        }
        @keyframes moonBreath { 
            from { opacity: 0.5; transform: translateX(-50%) scale(0.9); } 
            to { opacity: 0.9; transform: translateX(-50%) scale(1.1); } 
        }

        /* ================= HEADER ================= */
        #main-header {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }
        .header-led {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #dc2626 15%, 
                #fff 25%, 
                #dc2626 35%, 
                transparent 50%,
                #dc2626 65%, 
                #fff 75%, 
                #dc2626 85%, 
                transparent 100%);
            background-size: 300% 100%;
            animation: ledScan 4s linear infinite;
            opacity: 0.15;
        }
        @keyframes ledScan {
            0% { background-position: 0% 0; }
            100% { background-position: -300% 0; }
        }

        /* ================= GLASS & TYPOGRAPHY ================= */
        .glass-panel { 
            background: rgba(10, 10, 12, 0.72); 
            backdrop-filter: blur(26px); 
            border: 1px solid rgba(255,255,255,0.08); 
        }
        .hero-badge {
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(220,38,38,0.2);
        }
        .lux-text {
            font-weight: 900;
            letter-spacing: -0.04em;
            text-shadow: 0 10px 40px rgba(220,38,38,0.25);
        }

        /* ================= PREMIUM TEXTURES - ĐÃ KHÔI PHỤC + CẢI THIỆN CHÂN THẬT HƠN ================= */
        .glare {
            position: absolute; 
            inset: 0; 
            opacity: 0; 
            z-index: 5; 
            pointer-events: none; 
            transition: opacity 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            background-size: 250% 250%;
            mix-blend-mode: color-dodge;
            filter: contrast(1.15) brightness(1.08);
        }
        
        .effect-holo {
            background: linear-gradient(115deg, 
                transparent 8%, 
                rgba(220,38,38,0.35) 22%, 
                rgba(0,255,255,0.35) 38%, 
                rgba(255,255,255,0.45) 50%, 
                rgba(255,0,255,0.35) 62%, 
                rgba(220,38,38,0.35) 78%, 
                transparent 92%);
            animation: holoShift 8s linear infinite;
        }
        @keyframes holoShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }

        .effect-mirror {
            background: linear-gradient(105deg, 
                transparent 28%, 
                rgba(255,255,255,0.75) 42%, 
                rgba(255,255,255,0.85) 50%, 
                rgba(255,255,255,0.75) 58%, 
                transparent 72%);
            mix-blend-mode: screen;
            filter: brightness(1.3);
        }

        .effect-gold {
            background: linear-gradient(135deg, 
                #bf953f 10%, 
                #f1e8c2 25%, 
                #b38728 40%, 
                #f1e8c2 55%, 
                #bf953f 70%);
            mix-blend-mode: luminosity;
            filter: contrast(1.25) brightness(1.15);
        }

        .effect-holo-dots {
            background: 
                linear-gradient(115deg, transparent 15%, rgba(220,38,38,0.4) 28%, rgba(0,255,255,0.4) 45%, rgba(255,0,255,0.4) 65%, transparent 82%),
                radial-gradient(circle, rgba(255,255,255,0.65) 1px, transparent 1px);
            background-size: 220% 220%, 7px 7px;
            animation: holoShift 7s linear infinite;
        }

        .effect-holo-scratch {
            background: 
                linear-gradient(115deg, transparent 15%, rgba(220,38,38,0.4) 28%, rgba(0,255,255,0.4) 45%, rgba(255,0,255,0.4) 65%, transparent 82%),
                repeating-linear-gradient(62deg, transparent, transparent 1px, rgba(255,255,255,0.25) 2px, rgba(255,255,255,0.25) 3px);
            background-size: 220% 220%, 100% 100%;
            animation: holoShift 9s linear infinite;
        }

        .effect-liquid {
            background: radial-gradient(circle at 25% 35%, rgba(220,38,38,0.6), transparent 45%), 
                        radial-gradient(circle at 75% 65%, rgba(255,255,255,0.55), transparent 55%);
            background-size: 220% 220%;
            animation: liquidFlow 12s ease infinite;
            filter: blur(4px) contrast(1.2);
        }
        @keyframes liquidFlow {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }

        .effect-firework {
            background: radial-gradient(circle, rgba(255,255,255,0.9) 1px, transparent 2px), 
                        radial-gradient(circle, rgba(220,38,38,0.7) 2px, transparent 3px);
            background-size: 38px 38px, 62px 62px;
            background-position: 0 0, 20px 20px;
            mix-blend-mode: screen;
            filter: brightness(1.4);
        }

        .effect-texture-3d {
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 1px, transparent 1px, transparent 12px),
                        repeating-linear-gradient(-45deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 1px, transparent 1px, transparent 12px);
            mix-blend-mode: overlay;
            filter: contrast(1.1);
        }

        /* ================= CARD 3D - Hỗ trợ Touch Mobile ================= */
        .card-scene { 
            perspective: 1600px; 
            touch-action: none;
        }
        .card-inner {
            position: relative; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #050505; 
            z-index: 1;
            transform-style: preserve-3d; 
            will-change: transform; 
            transition: transform 0.1s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 0 !important;
            box-shadow: 0 30px 70px rgba(0,0,0,0.95);
        }

        /* Responsive card size */
        @media (max-width: 640px) {
            .card-scene {
                width: 280px !important;
                height: 392px !important;
            }
        }

        /* ================= HERO - Vị trí chuyên nghiệp ================= */
        .hero-section {
            padding-top: 7.5rem;
        }
        @media (min-width: 768px) {
            .hero-section {
                padding-top: 13rem;
            }
        }

        /* Scrollbar & UX */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 9999px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div id="yt-loader"></div>
    <div class="stars-bg"></div>
    <div class="stars-layer"></div>
    <div class="moon-glow"></div>

    <!-- HEADER -->
    <header id="main-header" class="fixed top-0 w-full z-50 glass-panel h-20 flex items-center border-b-0">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center relative z-10">
            <div class="flex items-center gap-6">
                <img id="site-logo" src="" alt="Rayn Scofield" class="h-8 opacity-0 transition-opacity duration-1000 object-contain" />
                <div class="pixel-board" id="led-matrix"></div>
            </div>
            <div class="text-[10px] tracking-[0.6em] text-gray-400 font-bold uppercase hidden md:block">
                RAYN SCOFIELD <span class="text-brand-red px-2">/</span> VISUAL ELITE
            </div>
        </div>
        <div class="header-led"></div>
        <div class="header-track"><div class="cyber-car" id="cyber-car"></div></div>
    </header>

    <!-- HERO -->
    <section class="hero-section pb-20 px-6 text-center relative z-10">
        <div class="inline-flex items-center gap-2 px-6 py-3 hero-badge text-[10px] font-bold tracking-[0.45em] text-brand-red mb-10 uppercase rounded-3xl shadow-inner">
            <span class="w-1.5 h-1.5 rounded-full bg-brand-red animate-pulse"></span> AVAILABLE FOR FREELANCE
        </div>
        
        <h1 class="lux-text tracking-tighter uppercase leading-[0.82] text-[14vw] md:text-[9.2rem] flex flex-wrap justify-center gap-x-5 select-none">
            <span class="text-white">VISUAL</span>
            <span class="text-brand-red">ELITE</span>
        </h1>
      
        <div class="flex flex-col md:flex-row items-center justify-center gap-8 text-gray-400 text-sm font-bold mt-12 mb-12 tracking-[0.4em] uppercase">
            <div class="flex items-center gap-3">
                <svg class="w-5 h-5 text-brand-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span id="p-country-name" class="text-white">Location</span>
            </div>
            <span class="hidden md:block w-1 h-1 rounded-full bg-gray-700"></span>
            <div class="flex items-center gap-3">
                <img id="p-school-logo" src="" alt="School" class="h-5 w-auto object-contain hidden" />
                <span id="p-school-name" class="text-white">University</span>
            </div>
        </div>
        
        <div id="p-skills-tags" class="flex flex-wrap justify-center gap-3 max-w-4xl mx-auto"></div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-40 relative z-10 flex-grow">
        <div id="loading" class="flex justify-center py-20"><div class="animate-spin h-8 w-8 border-t-2 border-brand-red rounded-full"></div></div>
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden opacity-0 transition-opacity duration-1000"></div>
    </main>

    <section class="py-40 border-t border-white/5 bg-[#030303] relative z-10 text-center shadow-[0_-20px_60px_rgba(0,0,0,0.6)]">
        <h2 class="lux-text text-4xl md:text-5xl mb-28 tracking-[-0.04em] text-white uppercase">Exclusive Collection</h2>
        <div id="cards-container" class="flex flex-wrap justify-center gap-12 md:gap-24"></div>
    </section>

    <footer class="py-24 bg-black border-t border-white/5 text-center relative z-10">
        <img id="footer-signature" src="" alt="Signature" class="h-20 md:h-28 mx-auto mb-10 invert opacity-40 hover:opacity-100 transition-all duration-1000 grayscale hover:grayscale-0 object-contain cursor-none" />
        <p class="text-[10px] tracking-[0.5em] text-gray-600 font-bold uppercase">&copy; <span id="current-year"></span> // RAYN SCOFIELD // ALL RIGHTS RESERVED</p>
    </footer>

    <!-- MODAL -->
    <div id="project-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-all duration-400">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-2xl cursor-pointer" onclick="closeModal()"></div>
        <div id="modal-content-box" class="relative glass-panel w-full max-w-[95vw] md:max-w-7xl h-[90vh] md:h-[85vh] flex flex-col md:flex-row overflow-hidden transform scale-95 transition-transform duration-400 rounded-3xl shadow-[0_0_90px_rgba(0,0,0,0.85)]">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-50 bg-black/60 hover:bg-brand-red text-white p-3 transition-colors rounded-full backdrop-blur-md border border-white/10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="w-full md:w-[60%] h-[45vh] md:h-full bg-black flex items-center justify-center p-8 border-r border-white/5 relative group">
                <img id="modal-img" src="" class="max-w-full max-h-full object-contain drop-shadow-2xl" />
                <button onclick="toggleFullScreen()" class="absolute bottom-8 right-8 bg-white/10 hover:bg-brand-red p-3 text-white transition-all opacity-0 group-hover:opacity-100 border border-white/20 rounded-2xl backdrop-blur-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
            <div class="w-full md:w-[40%] p-10 md:p-14 flex flex-col custom-scroll overflow-y-auto bg-transparent">
                <span id="modal-category" class="text-brand-red text-[10px] font-bold tracking-[0.5em] mb-6 uppercase glass-panel border-brand-red/20 px-4 py-1.5 rounded-full self-start shadow-md"></span>
                <h2 id="modal-title" class="lux-text text-3xl md:text-5xl mb-8 leading-[1.05] tracking-tighter"></h2>
                <div class="w-12 h-1 bg-gradient-to-r from-brand-red to-orange-500 mb-8 rounded-full"></div>
                <p id="modal-desc" class="text-gray-400 text-sm leading-relaxed mb-12 whitespace-pre-line font-light"></p>
                <div class="mt-auto border-t border-white/5 pt-8">
                    <a id="modal-link" href="#" target="_blank" class="block py-4 glass-panel text-center text-[10px] font-bold text-white hover:bg-brand-red hover:border-brand-red transition-all tracking-[0.5em] uppercase hidden rounded-xl">
                        LAUNCH PROJECT
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";
        document.getElementById('current-year').textContent = new Date().getFullYear();
        let globalProjects = [];

        function initLED() {
            const matrix = document.getElementById('led-matrix');
            const pattern = [0, 13, 42, 55, 16, 17, 20, 21, 30, 31, 34, 35];
            for(let i = 0; i < 56; i++) {
                const px = document.createElement('div');
                px.className = 'pxl';
                if([0,13,42,55].includes(i)) px.classList.add('r');
                else if(pattern.includes(i)) px.classList.add('w');
                matrix.appendChild(px);
            }
        }

        // Mouse + Touch unified handler
        let ticking = false;
        function mv(e, el) {
            if (!ticking) {
                requestAnimationFrame(() => {
                    const inner = el.querySelector('.card-inner');
                    const glare = el.querySelector('.glare');
                    const r = el.getBoundingClientRect();
                    const x = (e.clientX - r.left) / r.width - 0.5;
                    const y = (e.clientY - r.top) / r.height - 0.5;
                    
                    inner.style.transform = `rotateX(${y * -30}deg) rotateY(${x * 30}deg)`;
                    glare.style.opacity = '1';
                    glare.style.backgroundPosition = `${(x + 0.5) * 100}% ${(y + 0.5) * 100}%`;
                    ticking = false;
                });
                ticking = true;
            }
        }
        function ml(el) {
            const inner = el.querySelector('.card-inner');
            const glare = el.querySelector('.glare');
            inner.style.transform = 'rotateX(0deg) rotateY(0deg)';
            glare.style.opacity = '0';
        }

        function attachCardListeners() {
            document.querySelectorAll('.card-scene').forEach(el => {
                el.addEventListener('mousemove', (e) => mv(e, el));
                el.addEventListener('mouseleave', () => ml(el));

                let touching = false;
                el.addEventListener('touchstart', () => { touching = true; }, { passive: true });
                el.addEventListener('touchmove', (e) => {
                    if (!touching || e.touches.length !== 1) return;
                    const touch = e.touches[0];
                    const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                    mv(fakeEvent, el);
                }, { passive: true });
                el.addEventListener('touchend', () => {
                    touching = false;
                    ml(el);
                });
            });
        }

        // Header cyber trail
        const header = document.getElementById('main-header');
        const car = document.getElementById('cyber-car');
        let targetCarPos = -100, carPos = -100;
        header.addEventListener('mousemove', (e) => { 
            const rect = header.getBoundingClientRect(); 
            targetCarPos = e.clientX - rect.left - 26; 
        });
        header.addEventListener('mouseleave', () => { targetCarPos = -100; });
        function animateCar() { 
            carPos += (targetCarPos - carPos) * 0.13; 
            car.style.transform = `translateX(${carPos}px)`; 
            requestAnimationFrame(animateCar); 
        }
        animateCar();

        function parseCSVRow(str) {
            const result = []; 
            let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { 
                    result.push(cur); 
                    cur = ''; 
                } else cur += str[i];
            }
            result.push(cur); 
            return result.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        async function initPortfolio() {
            const yt = document.getElementById('yt-loader');
            yt.style.width = '35%';
            
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                yt.style.width = '82%';
              
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                const headers = parseCSVRow(rows[0]);
                
                const findCol = (name) => headers.findIndex(h => h.toLowerCase().replace(/[^a-z]/g, '').includes(name.toLowerCase()));
                
                const idxKey = findCol('configkey'), idxVal = findCol('configvalue'), idxEff = findCol('effect');
                const idxTitle = findCol('title'), idxCategory = findCol('category');
                const idxImageUrl = findCol('imageurl'), idxDescription = findCol('description'), idxLink = findCol('link');
                
                const config = {}, cards = [], projects = [];

                rows.slice(1).forEach(row => {
                    const vals = parseCSVRow(row);
                    const k = vals[idxKey] || '', v = vals[idxVal] || '';
                    const eff = (idxEff !== -1 && vals[idxEff]) ? vals[idxEff].toLowerCase().trim() : 'metal';

                    if (k) config[k] = v;

                    if (k.toLowerCase().startsWith('tradingcard') && v.startsWith('http')) {
                        cards.push({ img: v, eff: eff });
                    }
                    if (idxTitle !== -1 && vals[idxTitle]) {
                        projects.push({
                            Title: vals[idxTitle],
                            Category: vals[idxCategory] || '',
                            ImageUrl: vals[idxImageUrl] || '',
                            Description: vals[idxDescription] || '',
                            Link: vals[idxLink] || ''
                        });
                    }
                });

                if (config.siteLogo) { 
                    document.getElementById('site-logo').src = config.siteLogo; 
                    document.getElementById('site-logo').classList.remove('opacity-0'); 
                }
                if (config.siteSignature) document.getElementById('footer-signature').src = config.siteSignature;
                
                document.getElementById('p-country-name').textContent = config.country || 'Vietnam';
                if (config.schoolName) document.getElementById('p-school-name').textContent = config.schoolName;
                else document.getElementById('p-school-name').parentElement.classList.add('hidden');
                if (config.schoolLogo) { 
                    document.getElementById('p-school-logo').src = config.schoolLogo; 
                    document.getElementById('p-school-logo').classList.remove('hidden'); 
                }

                if (config.skills) {
                    document.getElementById('p-skills-tags').innerHTML = config.skills.split(',').map(s => 
                        `<span class="px-6 py-3 glass-panel text-[10px] font-bold text-gray-300 uppercase tracking-[0.3em] hover:text-white hover:border-brand-red hover:bg-brand-red/10 transition-all cursor-default shadow-sm rounded-full">${s.trim()}</span>`
                    ).join('');
                }

                const cardsContainer = document.getElementById('cards-container');
                cards.forEach(c => {
                    cardsContainer.innerHTML += `
                        <div class="card-scene w-[300px] h-[420px] md:w-[340px] md:h-[476px] cursor-crosshair">
                            <div class="card-inner">
                                <div class="glare effect-${c.eff}"></div>
                                <img src="${c.img}" class="w-full h-full object-cover" loading="lazy" alt="Trading Card" />
                            </div>
                        </div>`;
                });

                const grid = document.getElementById('portfolio-grid');
                projects.forEach((p, i) => {
                    grid.innerHTML += `
                        <div onclick="openModal(${i})" class="group glass-panel overflow-hidden cursor-pointer hover:border-white/30 transition-all duration-500 rounded-3xl relative hover:-translate-y-3 shadow-2xl">
                            <div class="h-72 overflow-hidden bg-black relative rounded-t-3xl">
                                <div class="absolute inset-0 bg-black/30 group-hover:bg-transparent transition-colors z-10 duration-500"></div>
                                <img src="${p.ImageUrl}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-all duration-1000 group-hover:scale-110" loading="lazy" alt="${p.Title}" />
                            </div>
                            <div class="p-8 pb-10 border-t border-white/5">
                                <h3 class="text-2xl font-black text-white truncate uppercase tracking-tighter group-hover:text-brand-red transition-colors">${p.Title}</h3>
                                <p class="text-gray-500 text-[10px] font-bold tracking-[0.4em] mt-3 uppercase">${p.Category}</p>
                            </div>
                            <div class="absolute bottom-0 left-0 h-1.5 w-0 bg-gradient-to-r from-brand-red to-orange-500 group-hover:w-full transition-all duration-700 z-30"></div>
                        </div>`;
                });

                globalProjects = projects;
                
                document.getElementById('loading').classList.add('hidden');
                grid.classList.remove('hidden');
                setTimeout(() => grid.classList.remove('opacity-0'), 100);
                
                yt.style.width = '100%'; 
                setTimeout(() => yt.style.opacity = '0', 600);

                attachCardListeners();

            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = `<p class="text-brand-red font-bold uppercase text-sm">Không thể tải dữ liệu. Vui lòng kiểm tra kết nối.</p>`;
            }
        }

        function openModal(index) {
            const p = globalProjects[index];
            if (!p) return;
            document.getElementById('modal-img').src = p.ImageUrl || '';
            document.getElementById('modal-category').textContent = p.Category || '';
            document.getElementById('modal-title').textContent = p.Title || '';
            document.getElementById('modal-desc').textContent = p.Description || '';
            const linkBtn = document.getElementById('modal-link');
            p.Link ? (linkBtn.href = p.Link, linkBtn.classList.remove('hidden')) : linkBtn.classList.add('hidden');
            
            const modal = document.getElementById('project-modal');
            const box = document.getElementById('modal-content-box');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            setTimeout(() => { modal.classList.remove('opacity-0'); box.classList.add('scale-100'); }, 10);
        }
        function closeModal() {
            const modal = document.getElementById('project-modal');
            const box = document.getElementById('modal-content-box');
            modal.classList.add('opacity-0');
            box.classList.remove('scale-100');
            setTimeout(() => { modal.classList.add('hidden'); document.body.style.overflow = ''; }, 420);
        }
        function toggleFullScreen() {
            const img = document.getElementById('modal-img');
            document.fullscreenElement ? document.exitFullscreen() : img.requestFullscreen().catch(() => {});
        }

        initLED();
        if (SHEET_CSV_URL.includes("http")) initPortfolio();
    </script>
</body>
</html>
