<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CHECK DATA // RAYN SCOFIELD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-10 font-mono">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-red-600 font-bold mb-2 uppercase tracking-tighter">Data Connection Test</h1>
        <p class="text-zinc-500 text-[10px] mb-10">Mục tiêu: Kiểm tra Card 1 & 2 có nhận đúng Effect theo hàng không.</p>

        <div id="test-results" class="space-y-4">
            </div>

        <div id="status" class="mt-10 text-[10px] text-zinc-600 border-t border-zinc-800 pt-4">
            Đang quét file CSV...
        </div>
    </div>

    <script>
        // 1. Dán link CSV của bạn vào đây
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";

        function parseCSVRow(str) {
            const res = []; let cur = '', inQ = false;
            for(let i=0; i<str.length; i++) {
                if(str[i] === '"') inQ = !inQ;
                else if(str[i] === ',' && !inQ) { res.push(cur); cur = ''; }
                else cur += str[i];
            }
            res.push(cur); return res.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        async function init() {
            try {
                const res = await fetch(SHEET_CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').filter(r => r.trim() !== '');
                const headers = parseCSVRow(rows[0]);
                
                // Tìm vị trí cột
                const idxKey = headers.findIndex(h => h.toLowerCase().includes('key'));
                const idxEff = headers.findIndex(h => h.toLowerCase().includes('eff'));

                const resultBox = document.getElementById('test-results');
                const status = document.getElementById('status');

                rows.slice(1).forEach((row, i) => {
                    const vals = parseCSVRow(row);
                    const key = vals[idxKey] || '';
                    const effect = (idxEff !== -1 && vals[idxEff]) ? vals[idxEff] : "NULL";

                    // Chỉ hiện card 1 và card 2 để test
                    if (key === 'tradingCard1' || key === 'tradingCard2') {
                        resultBox.innerHTML += `
                            <div class="p-4 bg-zinc-900 border border-zinc-800 rounded flex justify-between items-center">
                                <span class="text-zinc-400 text-xs">${key}</span>
                                <span class="text-xl font-black text-white uppercase underline decoration-red-600 decoration-4">
                                    ${effect}
                                </div>
                            </div>
                        `;
                    }
                });

                status.innerHTML = `Hoàn tất. Đã tìm thấy cột Effect ở Index: ${idxEff}`;
            } catch (e) {
                document.getElementById('status').innerHTML = "LỖI: " + e.message;
            }
        }

        init();
    </script>
</body>
</html>
