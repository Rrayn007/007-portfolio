<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayn Scofield // Exclusive Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { orange: '#f97316', red: '#dc2626', dark: '#0a0a0a', surface: '#111111' } },
                    animation: { 
                        'fade-in-up': 'fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'led-scan': 'ledScan 4s linear infinite'
                    },
                    keyframes: { 
                        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        ledScan: { '0%': { backgroundPosition: '0% 0%' }, '100%': { backgroundPosition: '100% 100%' } }
                    }
                }
            }
        }
    </script>
    <style>
        ::selection { background-color: #dc2626; color: white; }
        body { scroll-behavior: smooth; background-color: #050505; color: #f3f4f6; overflow-x: hidden; }
        
        /* Motion Background Core */
        .bg-motion {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
            background: linear-gradient(-45deg, #050505, #110604, #1a0805, #050505);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; opacity: 0.9;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Kính mờ cao cấp */
        .glass-panel { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }

        /* --- PIXEL LED GLOW (Yêu cầu mới) --- */
        .pixel-led-header {
            position: absolute; inset: 0; z-index: -1; opacity: 0.4;
            background-image: radial-gradient(rgba(220, 38, 38, 0.8) 1px, transparent 1px), radial-gradient(rgba(255, 255, 255, 0.5) 1px, transparent 1px);
            background-size: 16px 16px; background-position: 0 0, 8px 8px;
            /* Tạo màng quét ánh sáng qua các Pixel LED */
            mask-image: linear-gradient(90deg, transparent, rgba(0,0,0,1) 50%, transparent);
            mask-size: 200% 100%; animation: led-scan 4s infinite alternate;
        }
        @keyframes led-scan { 0% { mask-position: 0% 0; } 100% { mask-position: 100% 0; } }

        /* --- HỆ THỐNG 8 CHẤT LIỆU THẺ (MATERIALS) --- */
        .card-3d-wrapper { perspective: 1200px; }
        .card-3d-inner { transform-style: preserve-3d; transition: transform 0.1s ease-out; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .glare-layer { position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; z-index: 5; pointer-events: none; }

        .effect-holo { background: linear-gradient(115deg, transparent 20%, rgba(255,0,0,0.5) 30%, rgba(255,255,0,0.5) 40%, rgba(0,255,0,0.5) 50%, rgba(0,255,255,0.5) 60%, rgba(0,0,255,0.5) 70%, transparent 80%); background-size: 300% 300%; mix-blend-mode: color-dodge; filter: brightness(1.2); }
        .effect-mirror { background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.8) 45%, rgba(255,255,255,0.8) 50%, transparent 65%); background-size: 200% 200%; mix-blend-mode: overlay; }
        .effect-gold { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fcf6ba); mix-blend-mode: overlay; opacity: 0.8 !important; }
        .effect-diamond { background-image: radial-gradient(circle, white 1px, transparent 1.5px); background-size: 10px 10px; mix-blend-mode: color-dodge; opacity: 0.5 !important; }
        .effect-metal { background: linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 4px 100%; mix-blend-mode: overlay; opacity: 0.4 !important; }
        .effect-prism { background-image: linear-gradient(45deg, rgba(220,38,38,0.2) 25%, transparent 25%), linear-gradient(-45deg, rgba(255,255,255,0.2) 25%, transparent 25%); background-size: 20px 20px; mix-blend-mode: color-dodge; }
        .effect-cosmic { background-image: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.4) 1px, transparent 2px); background-size: 30px 30px; mix-blend-mode: screen; filter: drop-shadow(0 0 5px white); }
        .effect-oil { background: linear-gradient(135deg, rgba(220,38,38,0.3), rgba(255,255,255,0.3), rgba(0,0,0,0.1)); filter: blur(10px) contrast(2); mix-blend-mode: color-dodge; }

        /* Tùy chỉnh Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    </style>
</head>
<body class="antialiased font-sans flex flex-col min-h-screen">
    <div class="bg-motion"></div>

    <header class="fixed top-0 w-full z-40 glass-panel border-b border-white/5 overflow-hidden">
        <div class="pixel-led-header"></div> <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between relative z-10">
            <img id="site-logo" src="" alt="007" class="h-8 md:h-10 opacity-0 transition-opacity duration-500 object-contain drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]" />
            <div class="text-[10px] md:text-xs tracking-[0.3em] text-gray-400 uppercase font-bold">RAYN SCOFIELD</div>
        </div>
    </header>

    <section class="pt-48 pb-20 px-6 text-center animate-fade-in-up">
        <div class="inline-flex items-center gap-2 px-6 py-2 rounded-full border border-red-500/20 bg-red-500/10 text-[10px] font-bold tracking-[0.3em] text-brand-red mb-10 shadow-[0_0_20px_rgba(220,38,38,0.15)]">
            <span class="w-2.5 h-2.5 rounded-full bg-brand-red animate-pulse"></span> ELITE DESIGNER
        </div>
        
        <h1 class="flex flex-wrap justify-center items-center gap-x-4 md:gap-x-6 font-black tracking-tighter mb-12 uppercase italic leading-[0.9] text-[15vw] md:text-[9rem]">
            <span class="text-white drop-shadow-xl">Visual</span>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-red to-white pr-4 drop-shadow-md">Elite</span>
        </h1>
        
        <div id="p-skills-tags" class="flex flex-wrap justify-center gap-4 max-w-4xl mx-auto px-4"></div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-28 w-full flex-grow">
        <div id="loading" class="flex justify-center py-20"><div class="animate-spin h-10 w-10 border-t-2 border-brand-red rounded-full"></div></div>
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 hidden opacity-0 transition-all duration-1000"></div>
    </main>

    <section class="py-28 border-t border-white/5 bg-black/50">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-3xl md:text-4xl font-black mb-20 uppercase tracking-[0.4em] text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-600 italic">
                Exclusive Collection
            </h2>
            <div id="trading-cards-container" class="flex flex-wrap justify-center gap-14 md:gap-20"></div>
        </div>
    </section>

    <footer class="bg-[#030303] border-t border-white/5 pt-24 pb-16">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center">
            <img id="footer-signature" src="" alt="Rayn Scofield" class="h-20 md:h-28 mb-12 invert opacity-50 hover:opacity-100 hover:scale-105 transition-all duration-700 object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] grayscale hover:grayscale-0" />
            <p class="text-[9px] md:text-[10px] tracking-[0.5em] text-gray-600 uppercase font-bold">&copy; <span id="current-year"></span> // VISUAL ELITE BY RAYN SCOFIELD</p>
        </div>
    </footer>

    <div id="project-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-all duration-400">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="closeModal()"></div>
        <div id="modal-content-box" class="relative glass-panel w-full max-w-[95vw] md:max-w-6xl h-[85vh] rounded-3xl flex flex-col md:flex-row overflow-hidden scale-95 transition-all duration-400 border border-white/10 shadow-[0_0_80px_rgba(220,38,38,0.15)]">
            
            <button onclick="closeModal()" class="absolute top-5 right-5 z-50 bg-black/80 hover:bg-brand-red p-2.5 rounded-full text-white transition-colors border border-white/10">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <div class="w-full md:w-2/3 h-[45vh] md:h-full bg-black flex items-center justify-center p-6 border-r border-white/5 relative group">
                <img id="modal-img" src="" class="max-w-full max-h-full object-contain drop-shadow-2xl" />
                <button onclick="toggleFullScreen()" class="absolute bottom-6 right-6 bg-black/80 hover:bg-brand-red p-3 rounded-xl text-white transition-all opacity-0 group-hover:opacity-100 shadow-lg border border-white/10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
            
            <div class="w-full md:w-1/3 p-10 md:p-12 flex flex-col bg-[#070707] custom-scrollbar overflow-y-auto h-[40vh] md:h-full">
                <span id="modal-category" class="text-brand-red text-[10px] font-black uppercase tracking-[0.3em] mb-4"></span>
                <h2 id="modal-title" class="text-3xl md:text-4xl font-bold mb-6 text-white italic leading-snug"></h2>
                <div class="w-12 h-1.5 bg-brand-red mb-8"></div>
                <p id="modal-desc" class="text-gray-400 font-light leading-relaxed mb-10 text-sm whitespace-pre-line"></p>
                <a id="modal-link" href="#" target="_blank" class="mt-auto py-5 bg-white/5 border border-white/10 rounded-xl text-center text-[10px] font-black text-white hover:bg-brand-red hover:border-brand-red transition-all tracking-[0.3em] hidden uppercase">Launch Project</a>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";
        let globalProjects = [];

        function parseCSVRow(str) {
            const result = [];
            let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
                else cur += str[i];
            }
            result.push(cur);
            return result.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        // Hàm dò tìm Index không phân biệt hoa thường, khoảng trắng
        function getColIndex(headers, colName) {
            return headers.findIndex(h => h.toLowerCase().replace(/[^a-z0-9]/g, '') === colName.toLowerCase().replace(/[^a-z0-9]/g, ''));
        }

        async function init() {
            try {
                const res = await fetch(SHEET_CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').filter(r => r.trim() !== '');
                if (rows.length < 2) return;
                
                const headers = parseCSVRow(rows[0]);
                
                // Dò tìm cực kỳ thông minh
                const idxKey = getColIndex(headers, 'ConfigKey');
                const idxVal = getColIndex(headers, 'ConfigValue');
                const idxEffect = getColIndex(headers, 'TradingCardEffect'); 
                const idxTitle = getColIndex(headers, 'Title');
                const idxCategory = getColIndex(headers, 'Category');
                const idxImageUrl = getColIndex(headers, 'ImageUrl');
                const idxDesc = getColIndex(headers, 'Description');
                const idxLink = getColIndex(headers, 'Link');

                const config = {};
                const tradingCards = [];
                const projects = [];

                rows.slice(1).forEach(row => {
                    const vals = parseCSVRow(row);
                    const key = (idxKey !== -1 && vals[idxKey]) ? vals[idxKey].trim() : '';
                    const val = (idxVal !== -1 && vals[idxVal]) ? vals[idxVal].trim() : '';
                    const effect = (idxEffect !== -1 && vals[idxEffect]) ? vals[idxEffect].toLowerCase().trim() : 'metal';

                    // Lấy Cấu hình Hệ thống
                    if (key) config[key] = val;
                    
                    // Lấy Trading Cards (Cùng hàng)
                    if (key.toLowerCase().startsWith('tradingcard') && val.startsWith('http')) {
                        tradingCards.push({ image: val, effect: effect });
                    }

                    // Lấy Projects Portfolio
                    if (idxTitle !== -1 && vals[idxTitle]) {
                        projects.push({ 
                            Title: vals[idxTitle], 
                            Category: (idxCategory !== -1) ? vals[idxCategory] : '', 
                            ImageUrl: (idxImageUrl !== -1) ? vals[idxImageUrl] : '', 
                            Description: (idxDesc !== -1) ? vals[idxDesc] : '', 
                            Link: (idxLink !== -1) ? vals[idxLink] : '' 
                        });
                    }
                });

                // Cập nhật UI
                if(config.siteLogo) { document.getElementById('site-logo').src = config.siteLogo; document.getElementById('site-logo').classList.remove('opacity-0'); }
                if(config.siteSignature) document.getElementById('footer-signature').src = config.siteSignature;

                // Render Skills Interactive
                if(config.skills) {
                    const box = document.getElementById('p-skills-tags');
                    config.skills.split(',').forEach(s => {
                        box.innerHTML += `<span class="px-5 py-2.5 border border-white/10 bg-white/5 rounded-xl text-[10px] font-bold text-gray-400 uppercase tracking-widest hover:text-white hover:border-brand-red hover:bg-brand-red/10 hover:-translate-y-1 hover:shadow-[0_10px_20px_rgba(220,38,38,0.2)] transition-all duration-300 cursor-default">${s.trim()}</span>`;
                    });
                }

                // Render Trading Cards
                const container = document.getElementById('trading-cards-container');
                tradingCards.forEach(c => {
                    container.innerHTML += `
                        <div class="card-3d-wrapper w-[300px] h-[420px] md:w-[340px] md:h-[476px] cursor-crosshair" onmousemove="mv(event, this)" onmouseleave="ml(this)">
                            <div class="card-3d-inner w-full h-full relative rounded-3xl overflow-hidden border border-white/10 bg-[#0a0a0a] shadow-[0_20px_40px_rgba(0,0,0,0.8)]">
                                <div class="glare-layer effect-${c.effect}"></div>
                                <img src="${c.image}" class="w-full h-full object-cover" loading="lazy" />
                            </div>
                        </div>`;
                });

                globalProjects = projects;
                renderProjects(projects);

            } catch (error) { console.error("Lỗi:", error); }
        }

        function renderProjects(projs) {
            const grid = document.getElementById('portfolio-grid');
            projs.forEach((p, i) => {
                grid.innerHTML += `
                    <div onclick="openModal(${i})" class="group glass-panel rounded-[2rem] overflow-hidden cursor-pointer hover:-translate-y-3 hover:border-brand-red/50 hover:shadow-[0_15px_30px_rgba(220,38,38,0.15)] transition-all duration-500 animate-fade-in-up" style="animation-delay: ${i*100}ms; opacity:0;">
                        <div class="h-64 overflow-hidden bg-[#050505] relative">
                            <div class="absolute inset-0 bg-black/30 group-hover:bg-transparent transition-colors z-10 duration-500"></div>
                            <img src="${p.ImageUrl}" class="w-full h-full object-cover transform transition-all duration-1000 group-hover:scale-110" loading="lazy" />
                        </div>
                        <div class="p-8">
                            <h3 class="text-xl font-bold mb-2 text-white italic truncate uppercase tracking-tight group-hover:text-brand-red transition-colors">${p.Title}</h3>
                            <p class="text-gray-500 text-[10px] mt-2 uppercase tracking-[0.2em] font-bold">${p.Category}</p>
                        </div>
                    </div>`;
            });
            document.getElementById('loading').classList.add('hidden');
            grid.classList.remove('hidden');
            setTimeout(() => grid.classList.remove('opacity-0'), 50);
        }

        function mv(e, el) {
            const inner = el.querySelector('.card-3d-inner');
            const glare = el.querySelector('.glare-layer');
            const r = el.getBoundingClientRect();
            const x = (e.clientX - r.left) / r.width - 0.5;
            const y = (e.clientY - r.top) / r.height - 0.5;
            inner.style.transform = `rotateX(${y * -40}deg) rotateY(${x * 40}deg)`;
            glare.style.opacity = '1';
            glare.style.backgroundPosition = `${(x+0.5)*100}% ${(y+0.5)*100}%`;
            glare.style.setProperty('--x', `${(x+0.5)*100}%`);
            glare.style.setProperty('--y', `${(y+0.5)*100}%`);
        }
        function ml(el) {
            el.querySelector('.card-3d-inner').style.transform = 'rotateX(0) rotateY(0)';
            el.querySelector('.glare-layer').style.opacity = '0';
        }

        function openModal(i) {
            const p = globalProjects[i];
            document.getElementById('modal-img').src = p.ImageUrl;
            document.getElementById('modal-title').textContent = p.Title;
            document.getElementById('modal-category').textContent = p.Category;
            document.getElementById('modal-desc').textContent = p.Description;
            const link = document.getElementById('modal-link');
            if(p.Link) { link.href = p.Link; link.classList.remove('hidden'); } else { link.classList.add('hidden'); }
            document.getElementById('project-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            setTimeout(() => { document.getElementById('project-modal').classList.remove('opacity-0'); document.getElementById('modal-content-box').classList.remove('scale-95'); }, 10);
        }
        function closeModal() {
            document.getElementById('project-modal').classList.add('opacity-0');
            document.getElementById('modal-content-box').classList.add('scale-95');
            setTimeout(() => { document.getElementById('project-modal').classList.add('hidden'); document.body.style.overflow = ''; }, 400);
        }
        function toggleFullScreen() {
            const img = document.getElementById('modal-img');
            if (!document.fullscreenElement) { if (img.requestFullscreen) img.requestFullscreen(); else if (img.webkitRequestFullscreen) img.webkitRequestFullscreen(); } 
            else { if (document.exitFullscreen) document.exitFullscreen(); }
        }

        if(SHEET_CSV_URL.includes("http")) init();
    </script>
</body>
</html>
