<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayn Scofield // Elite Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { red: '#dc2626', dark: '#020203', surface: '#0a0a0c', border: '#1f1f2e' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        ::selection { background-color: #dc2626; color: white; }
        body { background-color: #020203; color: #fff; overflow-x: hidden; scroll-behavior: smooth; font-family: 'Inter', sans-serif; }

        /* 1. Loading Progress Bar */
        #yt-loader { position: fixed; top: 0; left: 0; height: 3px; background: #dc2626; z-index: 1000; transition: width 0.3s ease; width: 0%; box-shadow: 0 0 10px #dc2626; }

        /* 2. Moon & Space Atmosphere */
        .moon-glow {
            position: fixed; top: -35vh; left: 50%; transform: translateX(-50%);
            width: 120vw; height: 100vw; max-width: 1400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 45%, transparent 75%);
            border-radius: 50%; z-index: -1; pointer-events: none;
            animation: moonBreath 10s infinite alternate ease-in-out;
        }
        @keyframes moonBreath { from { opacity: 0.6; transform: translateX(-50%) scale(0.95); } to { opacity: 1; transform: translateX(-50%) scale(1.05); } }
        .stars-bg { position: fixed; inset: 0; z-index: -2; background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 60px 60px; }

        /* 3. Pixel LED Sticker */
        .pixel-board { display: grid; grid-template-columns: repeat(14, 1fr); gap: 1px; padding: 2px; background: #000; border: 1px solid #1f1f2e; width: 64px; height: 22px; }
        .pxl { background: #0a0a0c; border-radius: 0.5px; }
        .pxl.r { background: #dc2626; box-shadow: 0 0 5px #dc2626; animation: ledPulse 2s infinite; }
        .pxl.w { background: #fff; opacity: 0.8; }
        @keyframes ledPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* 4. Glass Nav & Motion Trail (Interactive) */
        .glass-nav { background: rgba(2, 2, 3, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-track { position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background: transparent; overflow: hidden; }
        .cyber-car { 
            position: absolute; bottom: 0; left: 0; width: 50px; height: 2px; 
            background: #dc2626; box-shadow: 0 0 15px 2px rgba(220, 38, 38, 0.9);
            transform: translateX(-100px);
            transition: transform 0.15s cubic-bezier(0.2, 0, 0, 1);
            will-change: transform;
        }

        /* 5. 3D Card System (Performance RAF, Sharp Corners) */
        .card-scene { perspective: 1500px; }
        .card-inner { 
            position: relative; width: 100%; height: 100%; overflow: hidden; background: #050505; z-index: 1;
            transform-style: preserve-3d; will-change: transform; transition: transform 0.1s linear;
            border: 1px solid rgba(255,255,255,0.08); /* Viền mảnh sắc nét */
            border-radius: 0px !important; /* Không bo góc Trading Card */
            box-shadow: 20px 20px 50px rgba(0,0,0,0.9);
        }
        .glare { position: absolute; inset: 0; opacity: 0; z-index: 5; pointer-events: none; transition: opacity 0.4s; }

        /* Materials */
        .effect-holo { background: linear-gradient(115deg, transparent 10%, rgba(255,0,0,0.3) 30%, rgba(0,255,0,0.2) 50%, rgba(0,0,255,0.3) 70%, transparent 90%); background-size: 200% 200%; mix-blend-mode: color-dodge; }
        .effect-mirror { background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.6) 45%, rgba(255,255,255,0.6) 55%, transparent 65%); background-size: 200% 200%; mix-blend-mode: overlay; }
        .effect-gold { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fcf6ba); mix-blend-mode: overlay; opacity: 0.8 !important; }
        
        /* Hiệu ứng texture */
        .effect-holo-dots { background: linear-gradient(115deg, transparent 20%, rgba(255,0,0,0.3) 30%, rgba(0,255,0,0.2) 50%, rgba(0,0,255,0.3) 70%, transparent 80%), radial-gradient(rgba(255,255,255,0.5) 1px, transparent 1px); background-size: 200% 200%, 8px 8px; mix-blend-mode: color-dodge; }
        .effect-holo-scratch { background: linear-gradient(115deg, transparent 20%, rgba(255,0,0,0.3) 30%, rgba(0,255,0,0.2) 50%, rgba(0,0,255,0.3) 70%, transparent 80%), repeating-linear-gradient(65deg, transparent, transparent 1px, rgba(255,255,255,0.1) 2px, rgba(255,255,255,0.1) 3px); background-size: 200% 200%, 100% 100%; mix-blend-mode: color-dodge; }
        .effect-liquid { background: radial-gradient(circle at 30% 40%, rgba(220,38,38,0.4), transparent 50%), radial-gradient(circle at 70% 60%, rgba(255,255,255,0.3), transparent 50%); background-size: 200% 200%; filter: blur(6px) contrast(1.3); mix-blend-mode: color-dodge; opacity: 0.9 !important; }
        .effect-firework { background: radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 2px), radial-gradient(circle, rgba(220,38,38,0.6) 2px, transparent 3px); background-size: 35px 35px, 55px 55px; background-position: 0 0, 15px 15px; mix-blend-mode: color-dodge; opacity: 0.7 !important; }
        .effect-texture-3d { background: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 10px), repeating-linear-gradient(-45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 10px); mix-blend-mode: overlay; opacity: 0.9 !important; }

        /* Scrollbar & Modal Glass */
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #dc2626; }
        .modal-glass { background: rgba(8, 8, 8, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="yt-loader"></div>
    <div class="stars-bg"></div>
    <div class="moon-glow"></div>

    <header id="main-header" class="fixed top-0 w-full z-50 glass-nav h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center relative z-10">
            <div class="flex items-center gap-6">
                <img id="site-logo" src="" alt="007" class="h-8 opacity-0 transition-opacity duration-1000 object-contain h-6 md:h-8 w-auto" />
                <div class="pixel-board" id="led-matrix"></div>
            </div>
            <div class="text-[10px] tracking-[0.4em] text-gray-500 font-bold uppercase hidden md:block">
                RAYN SCOFIELD <span class="text-brand-red px-2">/</span> VISUAL ELITE
            </div>
        </div>
        <div class="header-track overflow-hidden">
            <div class="cyber-car" id="cyber-car"></div>
        </div>
    </header>

    <section class="pt-52 pb-20 px-6 text-center relative z-10">
        <div class="inline-flex items-center gap-2 px-4 py-2 border border-brand-border bg-black text-[9px] font-bold tracking-[0.3em] text-brand-red mb-12 uppercase rounded-none shadow-[0_0_15px_rgba(220,38,38,0.1)]">
            <span class="w-1.5 h-1.5 bg-brand-red animate-pulse"></span> AVAILABLE FOR FREELANCE
        </div>

        <h1 class="font-black tracking-tighter uppercase leading-[0.85] text-[15vw] md:text-[9rem] flex flex-wrap justify-center gap-x-6 select-none pr-2">
            <span class="text-white drop-shadow-2xl">VISUAL</span>
            <span class="text-brand-red">ELITE</span>
        </h1>
        
        <div class="flex items-center justify-center gap-2 text-gray-500 text-xs font-bold mt-12 mb-10 tracking-[0.4em] uppercase">
            <svg class="w-4 h-4 text-brand-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span id="p-country-name" class="text-white">Vietnam</span>
        </div>

        <div id="p-skills-tags" class="flex flex-wrap justify-center gap-3 max-w-4xl mx-auto"></div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-32 relative z-10 flex-grow">
        <div id="loading" class="flex justify-center py-20"><div class="animate-spin h-8 w-8 border-t-2 border-brand-red rounded-full"></div></div>
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 hidden opacity-0 transition-opacity duration-1000"></div>
    </main>

    <section class="py-32 border-t border-brand-border bg-[#030303] relative z-10 text-center">
        <h2 class="text-3xl md:text-5xl font-black mb-24 tracking-tighter text-white uppercase italic">Exclusive Collection</h2>
        <div id="cards-container" class="flex flex-wrap justify-center gap-16 md:gap-24"></div>
    </section>

    <footer class="py-32 bg-black border-t border-brand-border text-center relative z-10">
        <img id="footer-signature" src="" alt="Signature" class="h-28 md:h-40 mx-auto mb-12 invert opacity-40 hover:opacity-100 transition-all duration-1000 grayscale hover:grayscale-0 object-contain cursor-none h-24 md:h-32 w-auto" />
        <p class="text-[9px] tracking-[0.6em] text-gray-700 font-bold uppercase">&copy; 2026 // Rayn Scofield // All Rights Reserved</p>
    </footer>

    <div id="project-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-all duration-400">
        <div class="absolute inset-0 bg-black/98 backdrop-blur-xl cursor-pointer" onclick="closeModal()"></div>
        <div id="modal-content-box" class="relative modal-glass w-full max-w-[95vw] md:max-w-7xl h-[90vh] md:h-[85vh] flex flex-col md:flex-row overflow-hidden transform scale-95 transition-transform duration-400 border border-brand-border rounded-xl shadow-[0_0_100px_rgba(0,0,0,1)]">
            
            <button onclick="closeModal()" class="absolute top-0 right-0 z-50 bg-brand-red hover:bg-white text-white hover:text-black p-4 transition-colors rounded-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="w-full md:w-[65%] h-[45vh] md:h-full bg-black flex items-center justify-center p-8 border-r border-brand-border relative group rounded-l-xl">
                <img id="modal-img" src="" class="max-w-full max-h-full object-contain drop-shadow-2xl" />
                <button onclick="toggleFullScreen()" class="absolute bottom-6 right-6 bg-white/10 hover:bg-brand-red p-3 text-white transition-all opacity-0 group-hover:opacity-100 border border-white/20 rounded-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
            
            <div class="w-full md:w-[35%] p-10 md:p-14 flex flex-col custom-scroll overflow-y-auto h-[40vh] md:h-full bg-[#0a0a0c] rounded-r-xl">
                <span id="modal-category" class="text-brand-red text-[10px] font-bold tracking-[0.4em] mb-6 uppercase border border-brand-red px-3 py-1 self-start"></span>
                <h2 id="modal-title" class="text-3xl md:text-5xl font-black text-white mb-8 leading-[1.1] tracking-tighter"></h2>
                <div class="w-12 h-1 bg-white mb-8"></div>
                <p id="modal-desc" class="text-gray-400 text-sm leading-relaxed mb-12 whitespace-pre-line font-light"></p>
                <div class="mt-auto border-t border-brand-border pt-8">
                    <a id="modal-link" href="#" target="_blank" class="block py-5 border border-white/20 bg-transparent text-center text-[10px] font-bold text-white hover:bg-brand-red hover:border-brand-red transition-all tracking-[0.4em] uppercase hidden rounded-none"> Launch Live Project </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";
        let globalProjects = [];

        function initLED() {
            const matrix = document.getElementById('led-matrix');
            const pattern = [0, 13, 42, 55, 16, 17, 20, 21, 30, 31, 34, 35]; // Pattern "007"
            for(let i=0; i<56; i++) {
                const px = document.createElement('div'); px.className = 'pxl';
                if([0,13,42,55].includes(i)) px.classList.add('r');
                else if(pattern.includes(i)) px.classList.add('w');
                matrix.appendChild(px);
            }
        }

        // Mouse Tracker for Header Light Trail
        const header = document.getElementById('main-header');
        const car = document.getElementById('cyber-car');
        let targetCarPos = -100, carPos = -100;
        header.addEventListener('mousemove', (e) => { const rect = header.getBoundingClientRect(); targetCarPos = e.clientX - rect.left - 25; });
        header.addEventListener('mouseleave', () => { targetCarPos = -100; });
        function animateCar() { carPos += (targetCarPos - carPos) * 0.1; car.style.transform = `translateX(${carPos}px)`; requestAnimationFrame(animateCar); }
        animateCar();

        function parseCSVRow(str) {
            const result = []; let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
                else cur += str[i];
            }
            result.push(cur); return result.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        async function initPortfolio() {
            const yt = document.getElementById('yt-loader');
            yt.style.width = '30%';
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                yt.style.width = '80%';
                
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                const headers = parseCSVRow(rows[0]);
                
                const findCol = (name) => headers.findIndex(h => h.toLowerCase().replace(/[^a-z]/g, '').includes(name.toLowerCase()));
                const idxKey = findCol('configkey'), idxVal = findCol('configvalue'), idxEff = findCol('effect');

                const config = {}, cards = [], projects = [];
                rows.slice(1).forEach(row => {
                    const vals = parseCSVRow(row);
                    const k = vals[idxKey] || '', v = vals[idxVal] || '';
                    const eff = (idxEff !== -1 && vals[idxEff]) ? vals[idxEff].toLowerCase().trim() : 'metal';

                    if(k) config[k] = v;
                    if(k.toLowerCase().startsWith('tradingcard') && v.startsWith('http')) { cards.push({ img: v, eff: eff }); }
                    
                    const tIdx = findCol('title');
                    if(tIdx !== -1 && vals[tIdx]) {
                        projects.push({ Title: vals[tIdx], Category: vals[findCol('category')] || '', ImageUrl: vals[findCol('imageurl')] || '', Description: vals[findCol('description')] || '', Link: vals[findCol('link')] || '' });
                    }
                });

                if(config.siteLogo) { document.getElementById('site-logo').src = config.siteLogo; document.getElementById('site-logo').classList.remove('opacity-0'); }
                if(config.siteSignature) { document.getElementById('footer-signature').src = config.siteSignature; }
                document.getElementById('p-country-name').textContent = config.country || 'Vietnam';

                if(config.skills) {
                    config.skills.split(',').forEach(s => {
                        document.getElementById('p-skills-tags').innerHTML += `<span class="px-4 py-2 border border-brand-border bg-[#050505] text-[10px] font-bold text-gray-500 uppercase tracking-widest hover:text-white hover:border-brand-red transition-all cursor-default rounded-none">${s.trim()}</span>`;
                    });
                }

                // Render Cards ( Sharp Brutalism)
                const cardsContainer = document.getElementById('cards-container');
                cards.forEach(c => {
                    cardsContainer.innerHTML += `
                        <div class="card-scene w-[300px] h-[420px] md:w-[340px] md:h-[476px] cursor-crosshair" onmousemove="mv(event, this)" onmouseleave="ml(this)">
                            <div class="card-inner">
                                <div class="glare effect-${c.eff}"></div>
                                <img src="${c.img}" class="w-full h-full object-cover rounded-none" loading="lazy" />
                            </div>
                        </div>`;
                });

                // Render Projects (Bo góc, Glass, No Grayscale)
                const grid = document.getElementById('portfolio-grid');
                projects.forEach((p, i) => {
                    grid.innerHTML += `
                        <div onclick="openModal(${i})" class="group glass-panel overflow-hidden cursor-pointer hover:border-brand-red/50 transition-all duration-500 rounded-3xl">
                            <div class="h-80 overflow-hidden bg-black relative rounded-t-3xl">
                                <img src="${p.ImageUrl}" class="w-full h-full object-cover group-hover:opacity-100 transition-all duration-700 group-hover:scale-105" loading="lazy" />
                            </div>
                            <div class="p-8 border-t border-brand-border">
                                <h3 class="text-2xl font-black text-white truncate uppercase tracking-tighter">${p.Title}</h3>
                                <p class="text-brand-red text-[10px] font-bold tracking-[0.3em] mt-3 uppercase">${p.Category}</p>
                            </div>
                        </div>`;
                });

                globalProjects = projects;
                document.getElementById('loading').classList.add('hidden');
                grid.classList.remove('hidden');
                setTimeout(() => { grid.classList.remove('opacity-0'); }, 50);
                yt.style.width = '100%'; setTimeout(() => yt.style.opacity = '0', 500);

            } catch (e) { document.getElementById('loading').innerHTML = "<p class='text-brand-red font-bold uppercase'>Lỗi kết nối dữ liệu.</p>"; }
        }

        // RAF 3D Engine
        let ticking = false;
        function mv(e, el) {
            if(!ticking) {
                window.requestAnimationFrame(() => {
                    const inner = el.querySelector('.card-inner'), glare = el.querySelector('.glare');
                    const r = el.getBoundingClientRect();
                    const x = (e.clientX - r.left) / r.width - 0.5, y = (e.clientY - r.top) / r.height - 0.5;
                    inner.style.transform = `rotateX(${y * -30}deg) rotateY(${x * 30}deg)`;
                    glare.style.opacity = '1';
                    glare.style.backgroundPosition = `${(x+0.5)*100}% ${(y+0.5)*100}%`;
                    ticking = false;
                }); ticking = true;
            }
        }
        function ml(el) { el.querySelector('.card-inner').style.transform = 'rotateX(0deg) rotateY(0deg)'; el.querySelector('.glare').style.opacity = '0'; }

        // Modal (rounded 3xl)
        function openModal(index) {
            const p = globalProjects[index];
            if(!p) return;
            document.getElementById('modal-img').src = p.ImageUrl || '';
            document.getElementById('modal-category').textContent = p.Category || '';
            document.getElementById('modal-title').textContent = p.Title || '';
            document.getElementById('modal-desc').textContent = p.Description || '';
            const linkBtn = document.getElementById('modal-link');
            if (p.Link) { linkBtn.href = p.Link; linkBtn.classList.remove('hidden'); } else { linkBtn.classList.add('hidden'); }
            const modal = document.getElementById('project-modal');
            const contentBox = document.getElementById('modal-content-box');
            modal.classList.remove('hidden'); document.body.style.overflow = 'hidden';
            setTimeout(() => { modal.classList.remove('opacity-0'); contentBox.classList.remove('scale-95'); contentBox.classList.add('scale-100'); }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('project-modal');
            const contentBox = document.getElementById('modal-content-box');
            modal.classList.add('opacity-0'); contentBox.classList.remove('scale-100'); contentBox.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); document.body.style.overflow = ''; }, 400);
        }

        function toggleFullScreen() {
            const img = document.getElementById('modal-img');
            if (!document.fullscreenElement) { img.requestFullscreen().catch(err => console.log(err)); } else { document.exitFullscreen(); }
        }

        initLED();
        if(SHEET_CSV_URL.includes("http")) { initPortfolio(); } 
    </script>
</body>
</html>
