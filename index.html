<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>007 | Rayn Scofield Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { orange: '#f97316', red: '#dc2626', dark: '#111111', light: '#f8fafc' }
                    },
                    animation: { 'fade-in-up': 'fadeInUp 0.8s ease-out forwards' },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::selection { background-color: #f97316; color: white; }
        body { scroll-behavior: smooth; transition: background 0.5s ease; }
        .loader { border-top-color: #f97316; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Tùy chỉnh thanh cuộn cho Modal */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-brand-light text-brand-dark antialiased font-sans min-h-screen flex flex-col overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#" class="block h-10 md:h-12 w-auto transition-transform hover:scale-105 active:scale-95">
                <img id="site-logo" src="" alt="007 Logo" class="h-full w-auto object-contain opacity-0 transition-opacity duration-500" />
            </a>
            <div class="text-sm font-medium text-gray-500">
                007 - Portfolio / <span class="text-brand-dark font-bold">Rayn Scofield</span>
            </div>
        </div>
    </header>

    <section class="py-24 px-6 bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto animate-fade-in-up flex flex-col lg:flex-row gap-16">
            
            <div class="flex-grow flex flex-col items-center lg:items-start text-center lg:text-left">
                <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-4 leading-tight drop-shadow-sm">
                    <span id="p-nickname" class="text-brand-dark">007 / </span>
                    <span id="p-fullname" class="text-transparent bg-clip-text bg-gradient-to-r from-brand-red to-brand-orange">Rayn Scofield</span>
                </h1>
                
                <div class="flex flex-col md:flex-row items-center lg:items-start gap-5 md:gap-10 text-xl text-gray-600 font-light mt-5">
                    <div class="flex items-center gap-3">
                        <span id="p-country-flag" class="text-3xl">VN</span> <span id="p-country-name">Vietnam</span>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <img id="p-school-logo" src="" alt="DNU" class="h-12 w-auto object-contain hidden" />
                        <span id="p-school-name" class="font-medium text-brand-dark">Dong Nai University (DNU)</span>
                    </div>
                </div>
            </div>
            
            <div class="w-full lg:w-2/5 flex flex-col gap-6">
                <h3 class="text-xs font-bold uppercase tracking-widest text-brand-orange">Skills & Tools</h3>
                <div id="p-skills-tags" class="flex flex-wrap gap-x-3 gap-y-3.5">
                    </div>
            </div>
        </div>
    </section>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-10 w-full mb-20">
        <div id="loading" class="flex justify-center items-center h-40">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
        </div>
        
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 hidden opacity-0 transition-opacity duration-1000">
            </div>
    </main>

    <footer class="bg-brand-dark text-gray-400 mt-auto border-t-4 border-brand-orange">
        <div class="max-w-7xl mx-auto px-6 py-16 flex flex-col items-center text-center">
            <div class="mb-10 h-16 md:h-20 w-auto">
                <img id="footer-signature" src="" alt="Signature" class="h-full w-auto object-contain opacity-0 transition-opacity duration-500 invert" />
            </div>
            <div class="w-24 h-px bg-zinc-700 mb-8"></div>
            <p class="text-sm tracking-wide mb-2">
                &copy; <span id="current-year"></span> Rayn Scofield. All rights reserved.
                <span class="text-brand-orange font-bold">/</span> 007
            </p>
        </div>
    </footer>

    <div id="project-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm cursor-pointer" onclick="closeModal()"></div>
        
        <div id="modal-content-box" class="relative bg-white text-brand-dark w-full max-w-6xl mx-4 max-h-[90vh] rounded-2xl md:rounded-3xl shadow-2xl flex flex-col md:flex-row overflow-hidden transform scale-95 transition-transform duration-300">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 z-50 bg-white/50 hover:bg-white p-2 rounded-full text-brand-dark transition-colors shadow-sm">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="w-full md:w-3/5 bg-gray-100 min-h-[300px] md:min-h-[600px] flex items-center justify-center relative group">
                <img id="modal-img" src="" alt="Project Image" class="w-full h-full max-h-[90vh] object-cover" />
            </div>
            
            <div class="w-full md:w-2/5 p-8 md:p-12 flex flex-col custom-scrollbar overflow-y-auto max-h-[50vh] md:max-h-[90vh]">
                <span id="modal-category" class="text-xs font-bold uppercase tracking-widest text-brand-orange mb-3 block">Category</span>
                <h2 id="modal-title" class="text-3xl md:text-4xl font-extrabold mb-6 text-brand-dark leading-tight">Project Title</h2>
                
                <div class="w-12 h-1 bg-brand-orange mb-8"></div>
                
                <p id="modal-desc" class="text-gray-600 mb-10 leading-relaxed font-light whitespace-pre-line text-lg">
                    Project description...
                </p>
                
                <div class="mt-auto pt-6">
                    <a id="modal-link" href="#" target="_blank" class="inline-flex items-center justify-center px-10 py-4 border border-transparent text-sm font-bold rounded-full text-white bg-brand-dark hover:bg-brand-orange transition-colors duration-300 w-fit hidden">
                        Xem chi tiết dự án &rarr;
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DÁN LINK CSV DUY NHẤT CỦA BẠN VÀO ĐÂY ===================
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";
        // ========================================================
        
        document.getElementById('current-year').textContent = new Date().getFullYear();
        let globalProjects = [];

        function parseCSVRow(str) {
            const result = [];
            let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
                else cur += str[i];
            }
            result.push(cur);
            return result.map(val => {
                val = val.trim();
                if (val.startsWith('"') && val.endsWith('"')) return val.slice(1, -1).replace(/""/g, '"');
                return val;
            });
        }

        async function initPortfolio() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                if (rows.length < 2) throw new Error("Dữ liệu trống");

                const headers = parseCSVRow(rows[0]);
                
                // Lấy vị trí cột
                const idxConfigKey = headers.indexOf('ConfigKey');
                const idxConfigValue = headers.indexOf('ConfigValue');
                const idxTitle = headers.indexOf('Title');
                const idxCategory = headers.indexOf('Category');
                const idxImageUrl = headers.indexOf('ImageUrl');
                const idxDesc = headers.indexOf('Description');
                const idxLink = headers.indexOf('Link');

                const config = {};
                const projects = [];

                rows.slice(1).forEach(row => {
                    const matchValues = parseCSVRow(row);
                    const getValue = (index) => (index < 0 || index >= matchValues.length) ? '' : matchValues[index];

                    // Cấu hình
                    const cKey = getValue(idxConfigKey);
                    if (cKey) config[cKey] = getValue(idxConfigValue);

                    // Dự án
                    const pTitle = getValue(idxTitle);
                    if (pTitle) {
                        projects.push({
                            Title: pTitle,
                            Category: getValue(idxCategory),
                            ImageUrl: getValue(idxImageUrl),
                            Description: getValue(idxDesc),
                            Link: getValue(idxLink)
                        });
                    }
                });

                // --- 1. Áp dụng Cấu hình UI ---
                if (config.siteLogo) {
                    const logo = document.getElementById('site-logo');
                    logo.src = config.siteLogo; logo.classList.remove('opacity-0');
                }
                if (config.siteSignature) {
                    const sig = document.getElementById('footer-signature');
                    sig.src = config.siteSignature; sig.classList.remove('opacity-0');
                }
                if (config.siteBackground) {
                    if (config.siteBackground.startsWith('http')) {
                        document.body.style.backgroundImage = `url('${config.siteBackground}')`;
                        document.body.style.backgroundSize = 'cover';
                        document.body.style.backgroundAttachment = 'fixed';
                    } else document.body.style.backgroundColor = config.siteBackground;
                }

                // --- 2. Áp dụng Thông tin Profile ---
                document.getElementById('p-fullname').textContent = config.fullName || 'Rayn Scofield';
                document.getElementById('p-nickname').textContent = (config.fullName ? '007 / ' : '007');
                document.getElementById('p-country-name').textContent = config.country || 'Vietnam';
                // Bạn có thể xử lý countryFlag thành icon ở đây
                document.getElementById('p-school-name').textContent = config.schoolName || 'University';
                if (config.schoolLogo) {
                    const sLogo = document.getElementById('p-school-logo');
                    sLogo.src = config.schoolLogo; sLogo.classList.remove('hidden');
                }

                // --- 3. Áp dụng Kỹ năng (Tags) ---
                if (config.skills) {
                    const skillsTagsGrid = document.getElementById('p-skills-tags');
                    const skillsArray = config.skills.split(',').map(s => s.trim()).filter(s => s !== '');
                    skillsArray.forEach(skill => {
                        skillsTagsGrid.innerHTML += `
                            <span class="inline-block px-4 py-2 border border-gray-100/50 bg-gray-50/50 rounded-full text-xs font-medium text-brand-dark shadow-sm transition-colors hover:border-brand-orange hover:bg-brand-light hover:text-brand-orange">
                                ${skill}
                            </span>
                        `;
                    });
                }

                // --- 4. Render Dự án ---
                globalProjects = projects;
                renderProjects(projects);

            } catch (error) {
                console.error("Lỗi:", error);
                document.getElementById('loading').innerHTML = "<p class='text-red-500'>Lỗi tải dữ liệu. Kiểm tra Sheet và link CSV.</p>";
            }
        }

        function renderProjects(projects) {
            const grid = document.getElementById('portfolio-grid');
            let htmlContent = '';
            
            projects.forEach((project, index) => {
                const img = project.ImageUrl || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800';
                const delay = index * 100;

                htmlContent += `
                    <div onclick="openModal(${index})" 
                       class="group relative bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl hover:-translate-y-3 transition-all duration-500 ease-out border border-gray-100/50 cursor-pointer animate-fade-in-up"
                       style="animation-delay: ${delay}ms; opacity: 0;"
                    >
                        <div class="relative h-72 overflow-hidden bg-gray-50">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity z-10 duration-500"></div>
                            <img src="${img}" alt="${project.Title}" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700 ease-in-out" />
                            <span class="absolute top-4 right-4 z-20 text-xs font-bold uppercase tracking-wider bg-white/90 text-brand-orange px-3 py-1 rounded-full shadow-sm">
                                ${project.Category || 'Portfolio'}
                            </span>
                        </div>
                        <div class="p-8 relative z-20">
                            <h3 class="text-2xl font-bold mb-3 text-brand-dark group-hover:text-brand-red transition-colors line-clamp-1">
                                ${project.Title || 'Dự án'}
                            </h3>
                            <p class="text-gray-600 line-clamp-2 font-light leading-relaxed text-sm">
                                ${project.Description || ''}
                            </p>
                        </div>
                        <div class="absolute bottom-0 left-0 h-1.5 w-0 bg-gradient-to-r from-brand-red to-brand-orange group-hover:w-full transition-all duration-500 ease-out z-30"></div>
                    </div>
                `;
            });

            grid.innerHTML = htmlContent;
            document.getElementById('loading').classList.add('hidden');
            grid.classList.remove('hidden');
            setTimeout(() => { grid.classList.remove('opacity-0'); }, 50);
        }

        function openModal(index) {
            const project = globalProjects[index];
            if(!project) return;
            
            document.getElementById('modal-img').src = project.ImageUrl || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800';
            document.getElementById('modal-category').textContent = project.Category || 'Danh mục';
            document.getElementById('modal-title').textContent = project.Title || 'Dự án';
            document.getElementById('modal-desc').textContent = project.Description || 'Không có mô tả chi tiết.';
            
            const linkBtn = document.getElementById('modal-link');
            if (project.Link && project.Link.trim() !== '') {
                linkBtn.href = project.Link;
                linkBtn.classList.remove('hidden');
            } else { linkBtn.classList.add('hidden'); }

            const modal = document.getElementById('project-modal');
            const contentBox = document.getElementById('modal-content-box');
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Khóa cuộn trang nền
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                contentBox.classList.remove('scale-95');
                contentBox.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('project-modal');
            const contentBox = document.getElementById('modal-content-box');
            
            modal.classList.add('opacity-0');
            contentBox.classList.remove('scale-100');
            contentBox.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = ''; // Mở khóa cuộn trang
            }, 300);
        }

        if(SHEET_CSV_URL.includes("http")) { initPortfolio(); } 
    </script>
</body>
</html>
