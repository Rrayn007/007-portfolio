<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayn Scofield // Elite Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { red: '#dc2626', dark: '#030305', surface: '#0a0a10', border: '#1a1a24' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: { 'fade-in-up': 'fadeInUp 1s ease-out forwards', 'pulse-moon': 'pulseMoon 8s infinite alternate' },
                    keyframes: { 
                        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        pulseMoon: { '0%': { opacity: '0.6', transform: 'translateX(-50%) scale(1)' }, '100%': { opacity: '1', transform: 'translateX(-50%) scale(1.05)' } }
                    }
                }
            }
        }
    </script>
    <style>
        ::selection { background-color: #dc2626; color: white; }
        body { background-color: #030305; color: #ffffff; overflow-x: hidden; scroll-behavior: smooth; }

        /* 1. YouTube Loading Bar */
        #yt-loader { position: fixed; top: 0; left: 0; height: 3px; background: #dc2626; z-index: 1000; transition: width 0.3s ease-out; width: 0%; box-shadow: 0 0 10px #dc2626; }

        /* 2. Space Theme & Glowing Moon */
        .moon-glow {
            position: absolute; top: -30vh; left: 50%; transform: translateX(-50%);
            width: 90vw; height: 90vw; max-width: 1000px; max-height: 1000px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 40%, rgba(3, 3, 5, 0) 70%);
            border-radius: 50%; z-index: -1; pointer-events: none;
        }
        .stars-bg {
            position: fixed; inset: 0; z-index: -2;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.3;
        }

        /* 3. Pixel LED Sticker (Red/White/Black Clean) */
        .pixel-sticker {
            width: 70px; height: 22px; background: #000; border: 1px solid #1a1a24; border-radius: 2px;
            display: grid; grid-template-columns: repeat(14, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; padding: 2px;
        }
        .pixel { background: #111; border-radius: 0.5px; }
        .pixel.red { background: #dc2626; box-shadow: 0 0 4px #dc2626; }
        .pixel.white { background: #fff; box-shadow: 0 0 4px #fff; }
        .pixel.blink { animation: ledBlink 1.5s infinite; }
        @keyframes ledBlink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* 4. TỐI ƯU HÓA HIỆU NĂNG 3D TRADING CARDS (Chống Lag) */
        .card-3d-wrapper { perspective: 1500px; }
        .card-3d-inner { 
            transform-style: preserve-3d; 
            /* Dùng will-change ép bật phần cứng GPU, loại bỏ lag */
            will-change: transform; 
            transition: transform 0.1s linear; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .glare { 
            position: absolute; inset: 0; opacity: 0; z-index: 5; pointer-events: none; 
            will-change: opacity, background-position; transition: opacity 0.3s;
        }
        
        /* Chỉnh sửa Effects gọn gàng, ít tốn tài nguyên hơn */
        .effect-holo { background: linear-gradient(115deg, transparent 20%, rgba(255,0,0,0.3) 30%, rgba(255,255,0,0.3) 40%, rgba(0,255,0,0.3) 50%, rgba(0,255,255,0.3) 60%, rgba(0,0,255,0.3) 70%, transparent 80%); background-size: 200% 200%; mix-blend-mode: color-dodge; }
        .effect-mirror { background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.5) 45%, rgba(255,255,255,0.5) 50%, transparent 60%); background-size: 200% 200%; mix-blend-mode: overlay; }
        .effect-gold { background: linear-gradient(135deg, rgba(191,149,63,0.4), rgba(252,246,186,0.5), rgba(179,135,40,0.4)); mix-blend-mode: overlay; }
        .effect-diamond { background-image: radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px); background-size: 8px 8px; mix-blend-mode: color-dodge; opacity: 0.3; }
        .effect-metal { background: linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 4px 100%; mix-blend-mode: overlay; opacity: 0.4; }
        .effect-prism { background-image: linear-gradient(45deg, rgba(220,38,38,0.15) 25%, transparent 25%), linear-gradient(-45deg, rgba(255,255,255,0.15) 25%, transparent 25%); background-size: 16px 16px; mix-blend-mode: color-dodge; }
        .effect-cosmic { background-image: radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 2px); background-size: 20px 20px; mix-blend-mode: screen; }
        .effect-oil { background: linear-gradient(135deg, rgba(220,38,38,0.2), rgba(255,255,255,0.2), rgba(0,0,0,0.1)); filter: blur(8px); mix-blend-mode: color-dodge; }

        .glass-header { background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="yt-loader"></div>
    <div class="stars-bg"></div>

    <header class="fixed top-0 w-full z-50 glass-header">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <img id="site-logo" src="" alt="007" class="h-8 opacity-0 transition-opacity duration-700 object-contain" />
                <div class="pixel-sticker" id="led-matrix"></div>
            </div>
            <div class="text-[10px] tracking-[0.3em] text-gray-500 font-bold uppercase hidden md:block">
                Rayn Scofield <span class="text-brand-red px-2">/</span> Elite
            </div>
        </div>
    </header>

    <section class="pt-48 pb-24 px-6 max-w-7xl mx-auto text-center relative z-10 overflow-hidden">
        <div class="moon-glow animate-pulse-moon"></div>
        
        <div class="inline-flex items-center gap-2 px-5 py-2 rounded border border-white/10 bg-white/5 text-[9px] font-bold tracking-[0.2em] text-gray-400 mb-10">
            <span class="w-1.5 h-1.5 rounded-full bg-brand-red animate-pulse"></span> SYSTEM ONLINE
        </div>
        
        <h1 class="flex flex-wrap justify-center items-center gap-x-6 font-black tracking-tighter mb-12 uppercase leading-none text-[15vw] md:text-[8rem]">
            <span class="text-white">VISUAL</span>
            <span class="text-brand-red">ELITE</span>
        </h1>
        
        <div id="p-skills" class="flex flex-wrap justify-center gap-3 relative z-10"></div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-32 relative z-10">
        <div id="loading" class="flex justify-center py-20"><div class="animate-spin h-8 w-8 border-t-2 border-brand-red rounded-full"></div></div>
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden opacity-0 transition-all duration-1000"></div>
    </main>

    <section class="py-32 border-t border-brand-border bg-brand-surface relative z-10">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-4">
                <h2 class="text-3xl font-bold tracking-tight text-white uppercase">Exclusive Collection</h2>
                <p class="text-gray-500 text-[10px] tracking-[0.2em] font-bold uppercase">Trading Card Masterpieces</p>
            </div>
            <div id="trading-cards-container" class="flex flex-wrap justify-center gap-12 md:gap-16"></div>
        </div>
    </section>

    <footer class="bg-brand-dark border-t border-brand-border py-24 relative z-10">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center text-center">
            <img id="footer-signature" src="" alt="Sign" class="h-20 md:h-28 mb-12 invert opacity-30 hover:opacity-100 transition-all duration-500 object-contain grayscale hover:grayscale-0" />
            <p class="text-[9px] tracking-[0.4em] text-gray-600 font-bold uppercase">&copy; 2026 // Designed by Rayn Scofield</p>
        </div>
    </footer>

    <div id="project-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-black/95" onclick="closeModal()"></div>
        <div id="modal-box" class="relative bg-brand-surface w-full max-w-[95vw] md:max-w-6xl h-[85vh] rounded-lg flex flex-col md:flex-row overflow-hidden scale-95 transition-all duration-300 border border-white/5 shadow-2xl">
            <button onclick="closeModal()" class="absolute top-5 right-5 z-50 text-gray-500 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="w-full md:w-[65%] h-[45vh] md:h-full bg-[#020202] flex items-center justify-center p-6 border-r border-white/5">
                <img id="modal-img" class="max-w-full max-h-full object-contain drop-shadow-2xl" />
            </div>
            <div class="w-full md:w-[35%] p-10 flex flex-col custom-scroll overflow-y-auto">
                <span id="modal-cat" class="text-brand-red text-[10px] font-bold tracking-[0.2em] mb-4 uppercase"></span>
                <h2 id="modal-title" class="text-2xl font-bold mb-6 text-white tracking-tight"></h2>
                <div class="w-8 h-1 bg-brand-red mb-8"></div>
                <p id="modal-desc" class="text-gray-400 text-sm leading-relaxed mb-10 whitespace-pre-line"></p>
                <a id="modal-link" href="#" target="_blank" class="mt-auto py-4 border border-white/10 bg-white/5 rounded text-center text-[10px] font-bold hover:bg-white hover:text-black transition-all tracking-[0.2em]">LAUNCH PROJECT</a>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";
        let globalProjects = [];

        // 1. Khởi tạo Pixel LED (Pattern chữ 007 cách điệu)
        function initLED() {
            const matrix = document.getElementById('led-matrix');
            // Mảng 56 pixel (14 cột x 4 hàng)
            const activePixels = [
                1,2, 4,5, 7,8,9, 12,13,
                1,3, 4,6, 9,     13,
                1,3, 4,6, 8,     12,
                1,2, 4,5, 8,     12
            ];
            for(let i=0; i<56; i++) {
                const px = document.createElement('div');
                px.className = 'pixel';
                if(activePixels.includes(i)) {
                    px.classList.add('white');
                    if(i % 3 === 0) px.classList.add('blink'); // Điểm nhấn nhấp nháy
                } else if (i === 0 || i === 13 || i === 42 || i === 55) {
                    px.classList.add('red', 'blink'); // 4 góc màu đỏ
                }
                matrix.appendChild(px);
            }
        }

        function parseCSVRow(str) {
            const result = [];
            let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
                else cur += str[i];
            }
            result.push(cur);
            return result.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        async function init() {
            const loader = document.getElementById('yt-loader');
            loader.style.width = '30%'; // Bắt đầu load
            
            try {
                const res = await fetch(SHEET_CSV_URL);
                loader.style.width = '60%';
                const data = await res.text();
                loader.style.width = '90%';
                
                const rows = data.split('\n').filter(r => r.trim() !== '');
                const headers = parseCSVRow(rows[0]);
                
                const findIdx = (name) => headers.findIndex(h => h.toLowerCase().replace(/[^a-z]/g, '').includes(name.toLowerCase()));
                const idxKey = findIdx('configkey');
                const idxVal = findIdx('configvalue');
                const idxEffect = findIdx('effect'); 

                const config = {};
                const tradingCards = [];
                const projects = [];

                rows.slice(1).forEach(row => {
                    const vals = parseCSVRow(row);
                    const key = (idxKey !== -1 && vals[idxKey]) ? vals[idxKey] : '';
                    const val = (idxVal !== -1 && vals[idxVal]) ? vals[idxVal] : '';
                    const effect = (idxEffect !== -1 && vals[idxEffect]) ? vals[idxEffect].toLowerCase().trim() : 'metal';

                    if (key) config[key] = val;
                    if (key.toLowerCase().startsWith('tradingcard') && val.startsWith('http')) {
                        tradingCards.push({ image: val, effect: effect });
                    }

                    const tIdx = findIdx('title');
                    if (tIdx !== -1 && vals[tIdx]) {
                        projects.push({ Title: vals[tIdx], Category: vals[findIdx('category')] || '', ImageUrl: vals[findIdx('imageurl')] || '', Description: vals[findIdx('description')] || '', Link: vals[findIdx('link')] || '' });
                    }
                });

                if(config.siteLogo) { document.getElementById('site-logo').src = config.siteLogo; document.getElementById('site-logo').classList.remove('opacity-0'); }
                if(config.siteSignature) document.getElementById('footer-signature').src = config.siteSignature;

                if(config.skills) {
                    const box = document.getElementById('p-skills');
                    config.skills.split(',').forEach(s => {
                        box.innerHTML += `<span class="px-4 py-1.5 border border-white/10 bg-white/5 rounded text-[9px] font-bold text-gray-400 uppercase tracking-widest hover:bg-white hover:text-black transition-colors cursor-default">${s.trim()}</span>`;
                    });
                }

                const container = document.getElementById('trading-cards-container');
                tradingCards.forEach(c => {
                    container.innerHTML += `
                        <div class="card-3d-wrapper w-[300px] h-[420px] md:w-[320px] md:h-[448px]" onmousemove="handleMouseMove(event, this)" onmouseleave="handleMouseLeave(this)">
                            <div class="card-3d-inner w-full h-full relative rounded-xl overflow-hidden border border-white/10 bg-brand-surface">
                                <div class="glare effect-${c.effect}"></div>
                                <img src="${c.image}" class="w-full h-full object-cover" loading="lazy" />
                            </div>
                        </div>`;
                });

                globalProjects = projects;
                renderProjects(projects);
                
                loader.style.width = '100%';
                setTimeout(() => { loader.style.opacity = '0'; }, 500);

            } catch (e) { 
                console.error(e); 
                loader.style.background = 'red';
            }
        }

        function renderProjects(projs) {
            const grid = document.getElementById('portfolio-grid');
            projs.forEach((p, i) => {
                grid.innerHTML += `
                    <div onclick="openModal(${i})" class="group bg-brand-surface border border-brand-border rounded-lg overflow-hidden cursor-pointer hover:border-white/20 transition-all duration-300 animate-fade-in-up" style="animation-delay: ${i*50}ms; opacity:0;">
                        <div class="h-64 overflow-hidden bg-[#000] relative">
                            <img src="${p.ImageUrl}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700" loading="lazy" />
                        </div>
                        <div class="p-6">
                            <h3 class="text-lg font-bold text-white truncate tracking-tight">${p.Title}</h3>
                            <p class="text-gray-500 text-[9px] mt-2 uppercase tracking-[0.2em] font-bold">${p.Category}</p>
                        </div>
                    </div>`;
            });
            document.getElementById('loading').classList.add('hidden');
            grid.classList.remove('hidden');
            setTimeout(() => grid.classList.remove('opacity-0'), 50);
        }

        // TỐI ƯU RAF CHỐNG LAG 100%
        let ticking = false;
        function handleMouseMove(e, el) {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const inner = el.querySelector('.card-3d-inner');
                    const glare = el.querySelector('.glare');
                    const r = el.getBoundingClientRect();
                    const x = (e.clientX - r.left) / r.width - 0.5;
                    const y = (e.clientY - r.top) / r.height - 0.5;
                    
                    inner.style.transform = `rotateX(${y * -30}deg) rotateY(${x * 30}deg)`;
                    glare.style.opacity = '1';
                    glare.style.backgroundPosition = `${(x+0.5)*100}% ${(y+0.5)*100}%`;
                    
                    ticking = false;
                });
                ticking = true;
            }
        }
        function handleMouseLeave(el) {
            const inner = el.querySelector('.card-3d-inner');
            const glare = el.querySelector('.glare');
            inner.style.transform = 'rotateX(0) rotateY(0)';
            glare.style.opacity = '0';
        }

        function openModal(i) {
            const p = globalProjects[i];
            document.getElementById('modal-img').src = p.ImageUrl;
            document.getElementById('modal-title').textContent = p.Title;
            document.getElementById('modal-cat').textContent = p.Category;
            document.getElementById('modal-desc').textContent = p.Description;
            const link = document.getElementById('modal-link');
            if(p.Link) { link.href = p.Link; link.classList.remove('hidden'); } else { link.classList.add('hidden'); }
            document.getElementById('project-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            setTimeout(() => { document.getElementById('project-modal').classList.remove('opacity-0'); document.getElementById('modal-box').classList.remove('scale-95'); }, 10);
        }
        function closeModal() {
            document.getElementById('project-modal').classList.add('opacity-0');
            document.getElementById('modal-box').classList.add('scale-95');
            setTimeout(() => { document.getElementById('project-modal').classList.add('hidden'); document.body.style.overflow = ''; }, 300);
        }

        initLED();
        if(SHEET_CSV_URL.includes("http")) init();
    </script>
</body>
</html>
