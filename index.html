<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>007 | Visual Elite by Rayn Scofield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { orange: '#f97316', red: '#dc2626', dark: '#0a0a0a', surface: '#111111' } },
                    animation: { 'fade-in-up': 'fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards' },
                    keyframes: { fadeInUp: { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <style>
        ::selection { background-color: #f97316; color: white; }
        body { scroll-behavior: smooth; background-color: #0a0a0a; color: #f3f4f6; overflow-x: hidden; }
        
        /* Motion Background */
        .bg-motion {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(-45deg, #0a0a0a, #140d0b, #1f0802, #0a0a0a);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; opacity: 0.8;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-panel { background: rgba(17, 17, 17, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }

        /* --- HỆ THỐNG CHẤT LIỆU THẺ (TỐI ƯU HÓA) --- */
        .card-3d-wrapper { perspective: 1200px; }
        .card-3d-inner { transform-style: preserve-3d; transition: transform 0.1s ease-out; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .glare-layer { position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; z-index: 5; pointer-events: none; }

        /* 1. Master Holo: Cầu vồng trượt góc nghiêng */
        .effect-holo { 
            background: linear-gradient(115deg, transparent 20%, rgba(255,0,0,0.4) 30%, rgba(255,255,0,0.4) 40%, rgba(0,255,0,0.4) 50%, rgba(0,255,255,0.4) 60%, rgba(0,0,255,0.4) 70%, transparent 80%);
            background-size: 300% 300%;
            mix-blend-mode: color-dodge;
        }

        /* 2. Master Mirror: Vệt sáng chéo cực bén */
        .effect-mirror { 
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.6) 25%, rgba(255,255,255,0.6) 30%, transparent 35%);
            background-size: 200% 200%;
            mix-blend-mode: overlay;
        }

        /* 3. Gold: Ánh vàng kim */
        .effect-gold { 
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fcf6ba 75%, #aa771c 100%);
            background-size: 200% 200%; mix-blend-mode: overlay; opacity: 0.6 !important;
        }

        /* 4. Diamond: Bụi kim cương */
        .effect-diamond { 
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.8) 1px, transparent 1px);
            background-size: 8px 8px; mix-blend-mode: color-dodge; opacity: 0.4 !important;
        }

        /* 5. Metal: Bề mặt kim loại xước */
        .effect-metal { 
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); 
            background-size: 3px 100%; mix-blend-mode: overlay; opacity: 0.4 !important; 
        }

        /* Scrollbar Fix */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #444; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
    </style>
</head>
<body class="antialiased font-sans flex flex-col min-h-screen">
    <div class="bg-motion"></div>

    <header class="fixed top-0 w-full z-40 glass-panel border-b-0">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <img id="site-logo" src="" alt="007" class="h-8 md:h-10 opacity-0 transition-opacity duration-500 object-contain" />
            <div class="text-xs tracking-widest text-gray-500 uppercase font-medium">
                <span class="text-brand-orange">007</span> &nbsp;//&nbsp; Portfolio
            </div>
        </div>
    </header>

    <section class="pt-40 pb-16 px-6 text-center relative z-10 animate-fade-in-up">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-gray-800 bg-gray-900/80 text-xs font-semibold tracking-widest text-brand-orange mb-8 shadow-inner">
            <span class="w-2 h-2 rounded-full bg-brand-orange animate-pulse"></span> AVAILABLE FOR FREELANCE
        </div>
        
        <h1 class="text-5xl md:text-8xl font-black tracking-tighter mb-6 leading-tight md:leading-snug uppercase italic break-words">
            Visual <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-red to-brand-orange">Elite</span>
        </h1>
        
        <div class="flex items-center justify-center gap-2 text-gray-400 font-light mb-10 text-lg">
            <svg class="w-5 h-5 text-brand-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span id="p-country-name" class="tracking-wider">Vietnam</span>
        </div>

        <div id="p-skills-tags" class="flex flex-wrap justify-center gap-3 max-w-4xl mx-auto"></div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-24 w-full relative z-10 flex-grow">
        <div id="loading" class="flex justify-center py-10"><div class="animate-spin h-10 w-10 border-t-2 border-b-2 border-brand-orange rounded-full"></div></div>
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden opacity-0 transition-all duration-1000"></div>
    </main>

    <section class="py-24 border-t border-white/5 bg-black/40 relative z-10">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-3xl font-bold mb-16 uppercase tracking-[0.3em] text-transparent bg-clip-text bg-gradient-to-r from-gray-300 to-gray-600 italic">
                Master Collection
            </h2>
            <div id="trading-cards-container" class="flex flex-wrap justify-center gap-12 md:gap-16"></div>
        </div>
    </section>

    <footer class="bg-[#050505] border-t border-white/5 relative z-10">
        <div class="max-w-7xl mx-auto px-6 py-16 flex flex-col items-center text-center">
            <img id="footer-signature" src="" alt="Signature" class="h-12 mb-8 invert opacity-50 hover:opacity-100 transition-opacity duration-500 object-contain" />
            <p class="text-xs tracking-widest text-gray-600 uppercase">
                &copy; <span id="current-year"></span> Rayn Scofield <span class="text-brand-orange px-2">|</span> 007
            </p>
        </div>
    </footer>

    <div id="project-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-all duration-400">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md cursor-pointer" onclick="closeModal()"></div>
        <div id="modal-content-box" class="relative glass-panel w-full max-w-[95vw] md:max-w-6xl h-[90vh] md:h-[85vh] rounded-3xl flex flex-col md:flex-row overflow-hidden scale-95 transition-all duration-400 shadow-2xl border border-white/10">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 z-50 bg-black/60 hover:bg-brand-orange p-2.5 rounded-full text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <div class="w-full md:w-2/3 h-[45vh] md:h-full bg-[#050505] flex items-center justify-center p-4 relative group border-r border-white/5">
                <img id="modal-img" src="" class="w-full h-full object-contain drop-shadow-2xl" />
                <button onclick="toggleFullScreen()" class="absolute bottom-6 right-6 bg-black/60 hover:bg-brand-orange p-3 rounded-xl text-white backdrop-blur-sm transition-all opacity-0 group-hover:opacity-100 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
            
            <div class="w-full md:w-1/3 p-8 md:p-10 flex flex-col bg-[#0a0a0a] custom-scrollbar overflow-y-auto h-[45vh] md:h-full">
                <span id="modal-category" class="text-brand-orange text-[10px] font-bold uppercase tracking-widest mb-3"></span>
                <h2 id="modal-title" class="text-2xl md:text-3xl font-bold mb-6 text-white italic leading-snug break-words"></h2>
                <div class="w-12 h-1 bg-gradient-to-r from-brand-red to-brand-orange mb-6"></div>
                <p id="modal-desc" class="text-gray-400 font-light leading-relaxed mb-8 whitespace-pre-line text-sm md:text-base break-words"></p>
                <a id="modal-link" href="#" target="_blank" class="mt-auto py-4 flex justify-center items-center gap-2 bg-white/5 border border-white/10 rounded-xl text-xs font-bold text-white hover:bg-brand-orange transition-all tracking-widest hidden group">
                    VIEW PROJECT
                    <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        // ========================================================
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";
        // ========================================================
        
        document.getElementById('current-year').textContent = new Date().getFullYear();
        let globalProjects = [];

        function parseCSVRow(str) {
            const result = [];
            let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
                else cur += str[i];
            }
            result.push(cur);
            return result.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        async function init() {
            try {
                const res = await fetch(SHEET_CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').filter(r => r.trim() !== '');
                if (rows.length < 2) return;
                
                const headers = parseCSVRow(rows[0]);
                const idxKey = headers.indexOf('ConfigKey');
                const idxVal = headers.indexOf('ConfigValue');
                const idxEffect = headers.indexOf('TradingCard_Effect'); 

                const config = {};
                const tradingCards = [];
                const projects = [];

                rows.slice(1).forEach(row => {
                    const vals = parseCSVRow(row);
                    const key = (idxKey !== -1) ? vals[idxKey] : '';
                    const val = (idxVal !== -1) ? vals[idxVal] : '';
                    const effect = (idxEffect !== -1 && vals[idxEffect]) ? vals[idxEffect] : 'metal'; 

                    if (key) config[key] = val;

                    if (key.startsWith('tradingCard') && val.startsWith('http')) {
                        tradingCards.push({ image: val, effect: effect.toLowerCase() });
                    }

                    const idxTitle = headers.indexOf('Title');
                    if (idxTitle !== -1 && vals[idxTitle]) {
                        projects.push({ 
                            Title: vals[idxTitle], 
                            Category: vals[headers.indexOf('Category')] || '', 
                            ImageUrl: vals[headers.indexOf('ImageUrl')] || '', 
                            Description: vals[headers.indexOf('Description')] || '', 
                            Link: vals[headers.indexOf('Link')] || '' 
                        });
                    }
                });

                if(config.siteLogo) {
                    const logo = document.getElementById('site-logo');
                    logo.src = config.siteLogo; logo.classList.remove('opacity-0');
                }
                if(config.siteSignature) document.getElementById('footer-signature').src = config.siteSignature;
                if(config.country) document.getElementById('p-country-name').textContent = config.country;

                if(config.skills) {
                    const skillBox = document.getElementById('p-skills-tags');
                    config.skills.split(',').forEach(s => {
                        skillBox.innerHTML += `<span class="px-4 py-1.5 rounded-md border border-white/5 bg-white/5 text-xs font-medium text-gray-300 uppercase tracking-widest">${s.trim()}</span>`;
                    });
                }

                const cardsContainer = document.getElementById('trading-cards-container');
                tradingCards.forEach(card => {
                    cardsContainer.innerHTML += `
                        <div class="card-3d-wrapper w-[300px] h-[420px] md:w-[320px] md:h-[450px] cursor-pointer" onmousemove="mv(event, this)" onmouseleave="ml(this)">
                            <div class="card-3d-inner w-full h-full relative rounded-2xl overflow-hidden border border-white/10 bg-zinc-900">
                                <div class="glare-layer effect-${card.effect}"></div>
                                <img src="${card.image}" class="w-full h-full object-cover relative z-0" loading="lazy" />
                                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-10 px-3 py-1 rounded bg-black/80 border border-white/10 text-[9px] uppercase tracking-[0.2em] text-gray-300 backdrop-blur-md">
                                    ${card.effect}
                                </div>
                            </div>
                        </div>
                    `;
                });

                globalProjects = projects;
                renderProjects(projects);

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = "<p class='text-brand-red'>Lỗi tải dữ liệu. Kiểm tra CSV.</p>";
            }
        }

        function renderProjects(projs) {
            const grid = document.getElementById('portfolio-grid');
            projs.forEach((p, i) => {
                grid.innerHTML += `
                    <div onclick="openModal(${i})" class="group glass-panel rounded-2xl overflow-hidden cursor-pointer hover:-translate-y-2 hover:border-brand-orange/50 transition-all duration-500 animate-fade-in-up shadow-lg" style="animation-delay: ${i*100}ms; opacity:0;">
                        <div class="relative h-64 overflow-hidden bg-[#050505] border-b border-white/5">
                            <div class="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors z-10 duration-500"></div>
                            <img src="${p.ImageUrl}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" loading="lazy" />
                            <span class="absolute top-4 left-4 z-20 text-[9px] font-bold uppercase tracking-widest bg-black/80 backdrop-blur-md text-white px-3 py-1.5 rounded border border-white/10">
                                ${p.Category}
                            </span>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold mb-2 text-white group-hover:text-brand-orange transition-colors line-clamp-2 italic leading-snug">
                                ${p.Title}
                            </h3>
                        </div>
                        <div class="absolute bottom-0 left-0 h-1 w-0 bg-gradient-to-r from-brand-red to-brand-orange group-hover:w-full transition-all duration-500 z-30"></div>
                    </div>
                `;
            });
            document.getElementById('loading').classList.add('hidden');
            grid.classList.remove('hidden');
            setTimeout(() => { grid.classList.remove('opacity-0'); }, 50);
        }

        /* --- XỬ LÝ MOTION CHUỘT --- */
        function mv(e, el) {
            const inner = el.querySelector('.card-3d-inner');
            const glare = el.querySelector('.glare-layer');
            const r = el.getBoundingClientRect();
            const x = (e.clientX - r.left) / r.width - 0.5;
            const y = (e.clientY - r.top) / r.height - 0.5;
            
            inner.style.transform = `rotateX(${y * -40}deg) rotateY(${x * 40}deg)`;
            glare.style.opacity = '1';
            
            // Tính toán vị trí Background mượt mà hơn cho Holo và Mirror
            const bgX = (x + 0.5) * 100;
            const bgY = (y + 0.5) * 100;
            glare.style.backgroundPosition = `${bgX}% ${bgY}%`;
        }
        function ml(el) {
            el.querySelector('.card-3d-inner').style.transform = 'rotateX(0deg) rotateY(0deg)';
            el.querySelector('.glare-layer').style.opacity = '0';
        }

        function openModal(i) {
            const p = globalProjects[i];
            document.getElementById('modal-img').src = p.ImageUrl;
            document.getElementById('modal-title').textContent = p.Title;
            document.getElementById('modal-category').textContent = p.Category;
            document.getElementById('modal-desc').textContent = p.Description;
            const link = document.getElementById('modal-link');
            if(p.Link) { link.href = p.Link; link.classList.remove('hidden'); } else { link.classList.add('hidden'); }
            
            const modal = document.getElementById('project-modal');
            const box = document.getElementById('modal-content-box');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            setTimeout(() => { modal.classList.remove('opacity-0'); box.classList.remove('scale-100'); }, 10);
        }
        function closeModal() {
            document.getElementById('project-modal').classList.add('opacity-0');
            document.getElementById('modal-content-box').classList.add('scale-95');
            setTimeout(() => { document.getElementById('project-modal').classList.add('hidden'); document.body.style.overflow = ''; }, 400);
        }

        function toggleFullScreen() {
            const img = document.getElementById('modal-img');
            if (!document.fullscreenElement) {
                if (img.requestFullscreen) img.requestFullscreen();
                else if (img.webkitRequestFullscreen) img.webkitRequestFullscreen();
                else if (img.msRequestFullscreen) img.msRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        if(SHEET_CSV_URL.includes("http")) init();
    </script>
</body>
</html>
