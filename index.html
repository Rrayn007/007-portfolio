<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TEST DATA CONNECTION // 007</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10 font-mono">
    
    <h1 class="text-xl font-bold mb-6 text-red-500 underline">RAW DATA FROM GOOGLE SHEETS</h1>
    
    <div class="overflow-x-auto">
        <table class="w-full border-collapse border border-zinc-800 text-left">
            <thead class="bg-zinc-900">
                <tr id="table-header">
                    </tr>
            </thead>
            <tbody id="table-body" class="text-xs">
                </tbody>
        </table>
    </div>

    <div id="status" class="mt-6 text-[10px] text-zinc-500">Đang tải dữ liệu...</div>

    <script>
        // 1. Dán link CSV của bạn vào đây
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";

        function parseCSVRow(str) {
            const result = []; let cur = '', inQuote = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuote = !inQuote;
                else if (str[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
                else cur += str[i];
            }
            result.push(cur);
            return result.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        async function init() {
            try {
                const res = await fetch(SHEET_CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').filter(r => r.trim() !== '');
                
                // Hiển thị Tiêu đề (Dòng 1)
                const headers = parseCSVRow(rows[0]);
                const headerRow = document.getElementById('table-header');
                headers.forEach(h => {
                    headerRow.innerHTML += `<th class="border border-zinc-800 p-3 text-zinc-400 uppercase">${h}</th>`;
                });

                // Hiển thị Dữ liệu (Dòng 2 trở đi)
                const tableBody = document.getElementById('table-body');
                rows.slice(1).forEach(row => {
                    const vals = parseCSVRow(row);
                    let rowHtml = '<tr>';
                    vals.forEach(v => {
                        // Nếu là Link thì rút gọn, nếu là Effect thì bôi đỏ cho dễ nhìn
                        const isLink = v.startsWith('http');
                        const isEffect = (v === 'gold' || v === 'mirror' || v === 'holo');
                        
                        rowHtml += `
                            <td class="border border-zinc-800 p-3 ${isEffect ? 'text-red-500 font-bold' : ''}">
                                ${isLink ? 'LINK_DETECTED' : v}
                            </td>`;
                    });
                    rowHtml += '</tr>';
                    tableBody.innerHTML += rowHtml;
                });

                document.getElementById('status').innerHTML = "KẾT NỐI THÀNH CÔNG: Đã tải " + (rows.length - 1) + " hàng.";

            } catch (e) {
                document.getElementById('status').innerHTML = "LỖI KẾT NỐI: " + e.message;
            }
        }

        init();
    </script>
</body>
</html>
