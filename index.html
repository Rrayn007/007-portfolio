<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>007 // Card Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020203; color: #fff; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        
        /* Moon Glow Effect */
        .moon-glow {
            position: fixed; top: -30vh; left: 50%; transform: translateX(-50%);
            width: 100vw; height: 80vh; 
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        /* Card 3D System */
        .card-scene { perspective: 1200px; }
        .card-wrap {
            position: relative; padding: 2px; border-radius: 1.5rem; overflow: hidden;
            background: #111; transform-style: preserve-3d; will-change: transform; transition: transform 0.1s linear;
        }
        /* Animated Border (Viền chạy) */
        .card-wrap::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, #dc2626, #fff, transparent, transparent);
            animation: spin 4s linear infinite; z-index: 0;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .card-inner { position: relative; width: 100%; height: 100%; border-radius: 1.4rem; overflow: hidden; background: #050505; z-index: 1; }
        .glare { position: absolute; inset: 0; opacity: 0; z-index: 5; pointer-events: none; transition: opacity 0.4s; }

        /* Hiệu ứng vật liệu từ bảng tính */
        .effect-holo { background: linear-gradient(115deg, transparent 10%, rgba(255,0,0,0.3) 30%, rgba(0,255,0,0.2) 50%, rgba(0,0,255,0.3) 70%, transparent 90%); background-size: 200% 200%; mix-blend-mode: color-dodge; }
        .effect-mirror { background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.6) 45%, rgba(255,255,255,0.6) 55%, transparent 65%); background-size: 200% 200%; mix-blend-mode: overlay; }
        .effect-gold { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fcf6ba); mix-blend-mode: overlay; opacity: 0.7 !important; }
        .effect-metal { background: linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 3px 100%; mix-blend-mode: overlay; opacity: 0.4; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-10">
    <div class="moon-glow"></div>

    <h1 class="text-4xl md:text-6xl font-black tracking-tighter mb-20 uppercase">
        <span class="text-white">EXCLUSIVE</span> <span class="text-brand-red text-red-600">COLLECTION</span>
    </h1>

    <div id="cards-container" class="flex flex-wrap justify-center gap-16 md:gap-24"></div>

    <script>
        // 1. Dán link CSV của bạn vào đây
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";

        function parseCSVRow(str) {
            const res = []; let cur = '', inQ = false;
            for(let i=0; i<str.length; i++) {
                if(str[i] === '"') inQ = !inQ;
                else if(str[i] === ',' && !inQ) { res.push(cur); cur = ''; }
                else cur += str[i];
            }
            res.push(cur); return res.map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        }

        async function init() {
            try {
                const res = await fetch(SHEET_CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').filter(r => r.trim() !== '');
                const headers = parseCSVRow(rows[0]);
                
                // Tự động tìm index cột dựa trên tên tiêu đề
                const idxKey = headers.findIndex(h => h.toLowerCase().includes('key'));
                const idxVal = headers.findIndex(h => h.toLowerCase().includes('value'));
                const idxEff = headers.findIndex(h => h.toLowerCase().includes('eff'));

                const container = document.getElementById('cards-container');

                rows.slice(1).forEach(row => {
                    const vals = parseCSVRow(row);
                    const key = vals[idxKey] || '';
                    const val = vals[idxVal] || '';
                    const effect = (idxEff !== -1 && vals[idxEff]) ? vals[idxEff].toLowerCase().trim() : 'metal';

                    // Chỉ lấy tradingCard1 và tradingCard2
                    if ((key === 'tradingCard1' || key === 'tradingCard2') && val.startsWith('http')) {
                        container.innerHTML += `
                            <div class="card-scene w-[300px] h-[420px] md:w-[340px] md:h-[476px]" onmousemove="mv(event, this)" onmouseleave="ml(this)">
                                <div class="card-wrap w-full h-full shadow-[0_30px_60px_rgba(0,0,0,0.8)]">
                                    <div class="card-inner">
                                        <div class="glare effect-${effect}"></div>
                                        <img src="${val}" class="w-full h-full object-cover" loading="lazy" />
                                    </div>
                                </div>
                            </div>`;
                    }
                });
            } catch (e) { console.error("Data Error:", e); }
        }

        // RAF Engine chống lag tuyệt đối
        let ticking = false;
        function mv(e, el) {
            if(!ticking) {
                window.requestAnimationFrame(() => {
                    const wrap = el.querySelector('.card-wrap'), glare = el.querySelector('.glare');
                    const r = el.getBoundingClientRect();
                    const x = (e.clientX - r.left) / r.width - 0.5, y = (e.clientY - r.top) / r.height - 0.5;
                    wrap.style.transform = `rotateX(${y * -25}deg) rotateY(${x * 25}deg)`;
                    glare.style.opacity = '1';
                    glare.style.backgroundPosition = `${(x+0.5)*100}% ${(y+0.5)*100}%`;
                    ticking = false;
                }); ticking = true;
            }
        }
        function ml(el) { 
            el.querySelector('.card-wrap').style.transform = 'rotateX(0deg) rotateY(0deg)'; 
            el.querySelector('.glare').style.opacity = '0'; 
        }

        init();
    </script>
</body>
</html>
