<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rayn Scofield // Visual Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                brand: {
                    red: '#8b1e1e',
                    glow: '#ff3b3b',
                    dark: '#050506',
                    surface: '#0c0c0f',
                    border: '#1a1a22'
                }
            },
            fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
    }
}
</script>

<style>
body {
    background:#050506;
    color:#fff;
    font-family:'Inter',sans-serif;
    letter-spacing:-0.01em;
    overflow-x:hidden;
}

/* 🌙 Moon Glow */
.moon-glow {
    position: fixed;
    top: -40vh;
    left: 50%;
    transform: translateX(-50%);
    width: 1200px;
    height: 1200px;
    background: radial-gradient(circle,
        rgba(255,255,255,0.08) 0%,
        rgba(255,255,255,0.04) 20%,
        rgba(139,30,30,0.08) 40%,
        transparent 70%);
    filter: blur(90px);
    opacity: 0.7;
    z-index: -1;
    animation: moonDrift 20s ease-in-out infinite alternate;
}
@keyframes moonDrift {
    from { transform: translateX(-50%) scale(1); }
    to { transform: translateX(-50%) scale(1.1); }
}

/* Noise */
body::after {
    content:"";
    position:fixed;
    inset:0;
    background:url('https://grainy-gradients.vercel.app/noise.svg');
    opacity:0.04;
    pointer-events:none;
}

/* Header */
header {
    backdrop-filter: blur(20px);
    background: rgba(0,0,0,0.4);
}

/* Hero */
.hero-text {
    background: linear-gradient(180deg,#fff,#888);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* Glass */
.glass-panel {
    background: rgba(12,12,15,0.6);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.05);
}

/* Project Card */
.project-card {
    border-radius:18px;
    overflow:hidden;
    transition:all 0.6s ease;
}
.project-card:hover {
    transform: translateY(-6px);
    box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

/* Trading Card */
.card-inner {
    transition: transform 0.3s ease;
    box-shadow:0 30px 80px rgba(0,0,0,0.8);
}
.glare {
    opacity:0.25;
    mix-blend-mode:soft-light;
}

/* Scroll */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:#333; }
::-webkit-scrollbar-thumb:hover { background:#8b1e1e; }
</style>
</head>

<body>

<div class="moon-glow"></div>

<!-- HEADER -->
<header class="fixed top-0 w-full z-50 h-16 flex items-center border-b border-white/5">
<div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
<div class="flex items-center gap-6">
<img id="site-logo" class="h-8 opacity-0 transition duration-700"/>
</div>

<div class="text-[10px] tracking-[0.4em] text-gray-400 uppercase">
RAYN SCOFIELD / VISUAL ELITE
</div>
</div>
</header>

<!-- HERO -->
<section class="pt-40 pb-20 text-center">
<h1 class="font-black uppercase leading-[0.9] text-[13vw] md:text-[8rem]">
<span class="hero-text">VISUAL</span><br>
<span class="text-brand-red">ELITE</span>
</h1>

<div class="mt-10 text-xs tracking-[0.3em] text-gray-400 uppercase">
<span id="p-country-name">Vietnam</span> / 
<span id="p-school-name">University</span>
</div>

<div id="p-skills-tags" class="flex flex-wrap justify-center gap-3 mt-10"></div>
</section>

<!-- PROJECT -->
<main class="max-w-7xl mx-auto px-6 pb-32">
<div id="portfolio-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</main>

<!-- TRADING -->
<section class="py-24 border-t border-white/5 text-center">
<h2 class="text-3xl font-black mb-16 uppercase">Collection</h2>
<div id="cards-container" class="flex flex-wrap justify-center gap-16"></div>
</section>

<footer class="py-20 text-center text-xs text-gray-600">
© <span id="current-year"></span> RAYN SCOFIELD
</footer>

<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";

document.getElementById('current-year').textContent = new Date().getFullYear();

function parseCSVRow(str){
let res=[],cur='',q=false;
for(let i=0;i<str.length;i++){
if(str[i]=='"') q=!q;
else if(str[i]==','&&!q){res.push(cur);cur='';}
else cur+=str[i];
}
res.push(cur);
return res.map(v=>v.trim().replace(/^"|"$/g,''));
}

async function init(){
const res=await fetch(SHEET_CSV_URL);
const txt=await res.text();

const rows=txt.split('\n').filter(r=>r);
const headers=parseCSVRow(rows[0]);

const find=(n)=>headers.findIndex(h=>h.toLowerCase().includes(n));

let projects=[],cards=[],config={};

rows.slice(1).forEach(r=>{
const v=parseCSVRow(r);

const key=v[find('configkey')]||'';
const val=v[find('configvalue')]||'';

if(key) config[key]=val;

if(key.startsWith('trading')&&val.startsWith('http')){
cards.push({img:val});
}

if(v[find('title')]){
projects.push({
title:v[find('title')],
img:v[find('image')],
cat:v[find('category')]
});
}
});

/* PROJECT UI */
const grid=document.getElementById('portfolio-grid');
projects.forEach(p=>{
grid.innerHTML+=`
<div class="project-card bg-brand-surface border border-white/5 cursor-pointer">
<div class="h-64">
<img src="${p.img}" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition duration-700">
</div>
<div class="p-6">
<h3 class="font-bold uppercase">${p.title}</h3>
<p class="text-xs text-gray-500 mt-2">${p.cat}</p>
</div>
</div>`;
});

/* CARD UI */
const ctn=document.getElementById('cards-container');
cards.forEach(c=>{
ctn.innerHTML+=`
<div class="w-[280px] h-[400px] card-inner">
<img src="${c.img}" class="w-full h-full object-cover">
</div>`;
});

/* CONFIG */
if(config.country) document.getElementById('p-country-name').textContent=config.country;

if(config.skills){
config.skills.split(',').forEach(s=>{
document.getElementById('p-skills-tags').innerHTML+=`
<span class="px-4 py-2 text-xs border border-white/10 rounded-full">${s}</span>`;
});
}

}

init();
</script>

</body>
</html>
